<!doctype html>
<html lang="en" data-theme="dark" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google" content="notranslate">
<title>WaxTree — New Password</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme=dark]{--bg:#07100A;--bg-s:#0B160D;--bg-e:#0F1C11;--bg-h:#152516;--text:#E8EDEA;--text-m:#8FB09A;--text-f:#4A6A56;--accent:#5EC47B;--accent-light:#90E0AA;--border:#152516;--shadow:0 8px 32px rgba(0,0,0,.65);--input-bg:#0F1C11;--err:#F47B5E;--ok:#5EC47B}
[data-theme=light]{--bg:#E8F0EA;--bg-s:#F4FBF6;--bg-e:#EAF2EC;--bg-h:#D4E8D8;--text:#1B2D22;--text-m:#3D6B4E;--text-f:#8FB09A;--accent:#3DAE5A;--accent-light:#5EC47B;--border:#C0D9C7;--shadow:0 8px 32px rgba(0,0,0,.12);--input-bg:#fff;--err:#D94F2E;--ok:#3DAE5A}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg-s);border:1px solid var(--border);border-radius:20px;padding:44px 40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.brand{text-align:center;margin-bottom:32px}
.brand-name{font-size:26px;font-weight:700;letter-spacing:-.4px}
.brand-name em{font-style:normal;color:var(--accent-light)}
.brand-sub{font-size:13px;color:var(--text-m);margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-m);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.field-wrap{position:relative}
.field input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,196,123,.14)}
.field input.error{border-color:var(--err)}
.field-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-f);font-size:15px;padding:2px;line-height:1;transition:color .15s}
.field-eye:hover{color:var(--text-m)}
.err-msg{font-size:12px;color:var(--err);margin-top:5px;min-height:16px}
.form-err{background:rgba(244,123,94,.1);border:1px solid rgba(244,123,94,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--err);margin-bottom:16px;display:none}
.form-err.show{display:block}
.pw-strength{margin-top:8px}
.pw-bar-wrap{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.pw-bar{height:100%;width:0%;border-radius:2px;transition:width .3s,background .3s}
.pw-label{font-size:11px;color:var(--text-f);margin-top:4px}
.btn-main{width:100%;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;margin-top:4px}
.btn-main:hover{opacity:.9}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:default}
.theme-btn{position:fixed;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-s);border:1px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.theme-btn:hover{background:var(--bg-h)}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
/* states */
.state{display:none}
.state.show{display:block}
.center{text-align:center}
.big-icon{font-size:48px;margin-bottom:16px}
.state-title{font-size:18px;font-weight:700;margin-bottom:10px}
.state-body{font-size:13px;color:var(--text-m);line-height:1.6;margin-bottom:24px}
.btn-secondary{display:inline-block;padding:11px 24px;border-radius:12px;border:1.5px solid var(--accent);color:var(--accent);font-size:14px;font-weight:600;text-decoration:none;transition:background .15s,color .15s}
.btn-secondary:hover{background:var(--accent);color:#fff}
.loading{text-align:center;color:var(--text-m);font-size:14px}
.loading-dot{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>

<div class="card">
  <div class="brand">
    <div class="brand-name"><em>Wax</em>Tree</div>
    <div class="brand-sub" id="brandSub">New password</div>
  </div>

  <!-- Loading -->
  <div class="state show" id="stateLoading">
    <div class="loading"><span class="loading-dot">●</span> Verifying…</div>
  </div>

  <!-- Form -->
  <div class="state" id="stateForm">
    <div class="form-err" id="formErr"></div>
    <form id="resetForm" novalidate>
      <div class="field">
        <label for="password">New password</label>
        <div class="field-wrap">
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" style="padding-right:40px">
          <button type="button" class="field-eye" id="eyeBtn1">👁</button>
        </div>
        <div class="pw-strength">
          <div class="pw-bar-wrap"><div class="pw-bar" id="pwBar"></div></div>
          <div class="pw-label" id="pwLabel"></div>
        </div>
        <div class="err-msg" id="passErr"></div>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <div class="field-wrap">
          <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" style="padding-right:40px">
          <button type="button" class="field-eye" id="eyeBtn2">👁</button>
        </div>
        <div class="err-msg" id="confirmErr"></div>
      </div>
      <button type="submit" class="btn-main" id="submitBtn">Set password</button>
    </form>
  </div>

  <!-- Success -->
  <div class="state center" id="stateSuccess">
    <div class="big-icon">✅</div>
    <div class="state-title">Password updated</div>
    <div class="state-body">You can now sign in with your new password.</div>
    <a href="login.html" class="btn-secondary">Go to sign in</a>
  </div>

  <!-- Error (expired or invalid link) -->
  <div class="state center" id="stateError">
    <div class="big-icon">⚠️</div>
    <div class="state-title">Invalid link</div>
    <div class="state-body">The recovery link has expired or is invalid. Request a new one.</div>
    <a href="forgot-password.html" class="btn-secondary">Request new link</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL='https://asmnqlqvlpcwcaaughuu.supabase.co';
const SUPABASE_KEY='sb_publishable_9_iPPYEKpklE07sQ1dmBow_wecQPqqZ';
const {createClient}=window.supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

// Theme
const html=document.documentElement;
const saved=localStorage.getItem('wt-theme');
if(saved)html.setAttribute('data-theme',saved);
const themeBtn=document.getElementById('themeBtn');
themeBtn.textContent=html.dataset.theme==='dark'?'☀':'🌙';
themeBtn.addEventListener('click',()=>{
  const next=html.dataset.theme==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('wt-theme',next);
  themeBtn.textContent=next==='dark'?'☀':'🌙';
});

function show(id){
  ['stateLoading','stateForm','stateSuccess','stateError'].forEach(s=>{
    document.getElementById(s).classList.toggle('show',s===id);
  });
}

// Supabase fires PASSWORD_RECOVERY event when user arrives via reset link
let recoveryReady=false;
sb.auth.onAuthStateChange((event,session)=>{
  if(event==='PASSWORD_RECOVERY'){
    recoveryReady=true;
    show('stateForm');
  }
});

// Fallback: if no event after 4s, show error
setTimeout(()=>{if(!recoveryReady)show('stateError');},4000);

// Eye toggles
function makeEye(btnId,inputId){
  const btn=document.getElementById(btnId),inp=document.getElementById(inputId);
  btn.addEventListener('click',()=>{
    const show=inp.type==='password';inp.type=show?'text':'password';btn.textContent=show?'🙈':'👁';
  });
}
makeEye('eyeBtn1','password');makeEye('eyeBtn2','confirm');

// Password strength
const pwInput=document.getElementById('password');
const pwBar=document.getElementById('pwBar');
const pwLabel=document.getElementById('pwLabel');
function calcStrength(pw){
  let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;return s;
}
const LEVELS=[{label:'',color:''},{label:'Weak',color:'#F47B5E'},{label:'Fair',color:'#F4C15E'},{label:'Good',color:'#90E0AA'},{label:'Great',color:'#5EC47B'},{label:'Strong',color:'#3DAE5A'}];
pwInput.addEventListener('input',()=>{
  const pw=pwInput.value;if(!pw){pwBar.style.width='0';pwLabel.textContent='';return;}
  const s=Math.max(1,calcStrength(pw));const lvl=LEVELS[Math.min(s,5)];
  pwBar.style.width=(s/5*100)+'%';pwBar.style.background=lvl.color;
  pwLabel.textContent=lvl.label;pwLabel.style.color=lvl.color;
});

function showFieldErr(id,msg){
  const err=document.getElementById(id);err.textContent=msg;
  const sib=err.previousElementSibling;
  const inp=sib?.tagName==='INPUT'?sib:sib?.querySelector('input');
  if(inp)inp.classList.toggle('error',!!msg);
}

// Submit
document.getElementById('resetForm').addEventListener('submit',async e=>{
  e.preventDefault();
  showFieldErr('passErr','');showFieldErr('confirmErr','');
  document.getElementById('formErr').classList.remove('show');
  const pass=document.getElementById('password').value;
  const confirm=document.getElementById('confirm').value;
  let ok=true;
  if(!pass||pass.length<8){showFieldErr('passErr','At least 8 characters');ok=false;}
  if(!confirm){showFieldErr('confirmErr','Confirm your password');ok=false;}
  else if(pass&&confirm!==pass){showFieldErr('confirmErr','Passwords do not match');ok=false;}
  if(!ok)return;

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Saving…';

  const {error}=await sb.auth.updateUser({password:pass});
  if(error){
    btn.disabled=false;btn.textContent='Set password';
    const fe=document.getElementById('formErr');fe.textContent=error.message;fe.classList.add('show');
  } else {
    await sb.auth.signOut();
    show('stateSuccess');
    document.getElementById('brandSub').textContent='Done!';
    setTimeout(()=>window.location.href='login.html',3000);
  }
});
</script>
</body>
</html>
