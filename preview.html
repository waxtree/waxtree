      el('h2',{cls:'modal-title'},'🌿 My Follows'),
      b('btn-sec',{onClick:()=>{st.followsModal=false;rr();}},'×')
    ));
    const list=d('follows-list',{});
    if(!st.follows.length){
      list.appendChild(d('daq-empty',{},'Follow artists and labels to see them here'));
    } else {
      st.follows.forEach(f=>{
        const item=d('follows-item',{});
        if(f.thumb){
          item.appendChild(el('img',{cls:'follows-thumb',src:f.thumb,alt:f.name,loading:'lazy'}));
        } else {
          const ph=d('follows-thumb-ph',{});ph.appendChild(f.type==='label'?svgLabel():svgArtist());item.appendChild(ph);
        }
        const info=d('daq-info',{});
        info.appendChild(s('daq-title',f.name));
        info.appendChild(s('daq-meta',f.type==='label'?'Label':'Artist'));
        item.appendChild(info);
        item.appendChild(b('follows-unfollow',{title:'Unfollow',onClick:()=>{
          st.follows=st.follows.filter(x=>x.id!==f.id);saveSt();rr();
        }},'×'));
        list.appendChild(item);
      });
    }
    modal.appendChild(list);
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  // ── Discogs Collection modal ────────────────────────────────
  if(st.discogsModal){
    const overlay=d('overlay',{onClick:()=>{if(!st.discogsSyncing){st.discogsModal=false;rr();}}});
    const modal=d('modal daq-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('modal-row',{style:{justifyContent:'space-between',marginBottom:'4px'}},
      el('h2',{cls:'modal-title'},'🎵 Discogs Collection'),
      b('btn-sec',{onClick:()=>{if(!st.discogsSyncing){st.discogsModal=false;rr();}}}, '×')
    ));

    if(!st.discogsUser){
      // Not connected — OAuth connect button
      modal.appendChild(el('p',{cls:'modal-sub'},'Connect your Discogs account to sync your collection and wantlist. You\'ll log in on Discogs.'));
      const connectBtn=el('button',{cls:'discogs-btn',onClick:async()=>{
        connectBtn.disabled=true;connectBtn.textContent='Connecting…';
        try{
          const cbUrl=location.origin+location.pathname;
          const data=await edgeFn({action:'request_token',callback_url:cbUrl});
          sessionStorage.setItem('discogs_oauth_secret',data.oauth_token_secret);
          window.location.href=`https://www.discogs.com/oauth/authorize?oauth_token=${data.oauth_token}`;
        }catch(e){
          connectBtn.disabled=false;
          connectBtn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4"/></svg> Connect with Discogs';
          alert('Connection failed: '+e.message);
        }
      }});
      connectBtn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4"/></svg> Connect with Discogs';
      modal.appendChild(connectBtn);
    } else {
      // Connected — show info + sync options
      const info=d('discogs-connected-info',{});
      info.appendChild(el('div',{style:'font-weight:600;color:var(--text);margin-bottom:4px'},'Connected as @'+st.discogsUser));
      if(st.discogsCollSyncedAt){
        info.appendChild(el('div',{},'Last synced: '+new Date(st.discogsCollSyncedAt).toLocaleString()));
        info.appendChild(el('div',{},'Collection: '+st.discogsCollReleaseIds.length+' releases · Wantlist: '+st.discogsWantReleaseIds.length));
      } else {
        info.appendChild(el('div',{style:'color:var(--accent)'},'Not synced yet'));
      }
      modal.appendChild(info);

      if(st.discogsSyncing){
        modal.appendChild(d('',{style:'font-size:13px;color:var(--accent);padding:6px 0;font-style:italic'},'Syncing… this may take a moment'));
      }

      const syncBtn=b('s-btn',{style:'width:100%;margin-top:4px',onClick:async()=>{
        try{await syncDiscogsAccount();}
        catch(e){alert('Sync failed: '+e.message);}
      }},st.discogsSyncing?'Syncing…':'Sync now');
      if(st.discogsSyncing)syncBtn.setAttribute('disabled','');
      modal.appendChild(syncBtn);

      if(!st.discogsSyncing){
        const disconnectBtn=b('btn-sec',{style:'width:100%;margin-top:8px',onClick:()=>{
          st.discogsOAuthToken='';st.discogsOAuthSecret='';st.discogsUser='';
          st.discogsCollReleaseIds=[];st.discogsCollMasterIds=[];
          st.discogsWantReleaseIds=[];st.discogsWantMasterIds=[];
          st.discogsCollSyncedAt=null;saveSt();rr();
        }},'Disconnect Discogs account');
        modal.appendChild(disconnectBtn);
      }
    }

    overlay.appendChild(modal);root.appendChild(overlay);
  }

  // ── Profile modal ───────────────────────────────────────────
  if(st.profileModal){
    const count=st.searchCount;
    const curLvl=getLevelFromCount(count);
    const nextLvl=LEVELS.find(l=>l.level===curLvl.level+1&&l.level<=15)||null;
    const progress=getProgressToNext(count);
    const remaining=nextLvl?nextLvl.min-count:0;
    const overlay=d('overlay',{onClick:()=>{st.profileModal=false;rr();}});
    const modal=d('modal profile-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('modal-row',{style:{justifyContent:'space-between',marginBottom:'16px'}},
      el('h2',{cls:'modal-title'},'🌲 My Profile'),
      b('btn-sec',{onClick:()=>{st.profileModal=false;rr();}},'×')
    ));
    const body=d('settings-body',{});
    // Hero
    const hero=d('lvl-hero',{});
    hero.appendChild(s('lvl-hero-title',curLvl.title));
    hero.appendChild(s('lvl-hero-tagline',curLvl.tagline));
    body.appendChild(hero);
    // Progress bar
    if(curLvl.level<15){
      const barWrap=d('lvl-bar-wrap',{});
      barWrap.appendChild(d('lvl-bar',{style:{width:progress+'%'}}));
      body.appendChild(barWrap);
      body.appendChild(d('lvl-bar-info',{},
        s('',progress+'% to next level'),
        s('',remaining+' more search'+(remaining!==1?'es':'')+' to unlock '+nextLvl.title)
      ));
    }
    // All 15 levels list
    const list=d('lvl-list',{});
    LEVELS.filter(l=>l.level<=15).forEach(l=>{
      const isActive=l.level===curLvl.level;
      const isUnlocked=count>=l.min;
      const item=d('lvl-item'+(isActive?' active':!isUnlocked?' locked':''),{});
      item.appendChild(s('lvl-num',l.level.toString()));
      const info=d('',{});
      info.appendChild(s('lvl-item-title',l.title));
      if(isUnlocked)info.appendChild(s('lvl-item-tag',l.tagline));
      item.appendChild(info);
      list.appendChild(item);
    });
    body.appendChild(list);
    modal.appendChild(body);
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  // ── Settings modal ──────────────────────────────────────────
  if(st.settingsModal){
    const overlay=d('overlay',{onClick:()=>{st.settingsModal=false;rr();}});
    const modal=d('modal settings-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('modal-row',{style:{justifyContent:'space-between',marginBottom:'16px'}},
      el('h2',{cls:'modal-title'},'⚙ My Settings'),
      b('btn-sec',{onClick:()=>{st.settingsModal=false;rr();}},'×')
    ));
    const email=wtSession?.user.email||'';
    const body=d('settings-body',{});

    // ── Account
    body.appendChild(s('st-section','Account'));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Email'),s('st-sub',email))
    ));
    // Profile photo row
    const avUrl=wtSession?.user?.user_metadata?.avatar_url;
    const avInput=el('input',{type:'file',accept:'image/jpeg,image/png,image/webp',style:{display:'none'}});
    const avMsg=el('p',{style:{fontSize:'12px',margin:'4px 0 0',minHeight:'0',color:'var(--text-m)'}});
    const avBtn=b('btn-sec',{},avUrl?'Change photo':'Add photo');
    avBtn.onclick=()=>avInput.click();
    avInput.addEventListener('change',async()=>{
      const file=avInput.files[0];if(!file)return;
      avBtn.disabled=true;avBtn.textContent='Uploading…';avMsg.style.color='var(--text-m)';avMsg.textContent='';
      try{
        await uploadAvatar(file);
        avMsg.style.color='var(--accent)';avMsg.textContent='Photo updated!';
        avBtn.disabled=false;avBtn.textContent='Change photo';
        rr();
      }catch(e){
        avMsg.style.color='#F47B5E';avMsg.textContent=e.message||'Upload failed.';
        avBtn.disabled=false;avBtn.textContent=avUrl?'Change photo':'Add photo';
      }
    });
    const avRow=d('st-row',{style:{gap:'12px',alignItems:'center'}});
    avRow.appendChild(buildAvatarEl(48));
    const avLeft=d('',{style:{flex:'1',minWidth:'0'}});
    avLeft.appendChild(s('st-lbl','Profile photo'));
    avLeft.appendChild(s('st-sub',avUrl?'Linked to your account':'No photo yet'));
    avLeft.appendChild(avMsg);
    avRow.appendChild(avLeft);
    avRow.appendChild(avInput);
    avRow.appendChild(avBtn);
    body.appendChild(avRow);
    // Change password row — expands into an inline form
    const pwRow=d('st-row',{style:{flexWrap:'wrap',gap:'10px'}},
      d('',{},s('st-lbl','Password'),s('st-sub','Set a new password for your account'))
    );
    const pwForm=d('',{style:{display:'none',flexBasis:'100%',paddingBottom:'4px'}});
    const pwInput=el('input',{type:'password',placeholder:'New password (min. 8 chars)',style:{width:'100%',padding:'8px 12px',borderRadius:'10px',background:'var(--bg-e)',border:'1.5px solid var(--border)',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'}});
    const pwConfirm=el('input',{type:'password',placeholder:'Confirm new password',style:{width:'100%',padding:'8px 12px',borderRadius:'10px',background:'var(--bg-e)',border:'1.5px solid var(--border)',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'}});
    const pwMsg=el('p',{style:{fontSize:'12px',minHeight:'16px',margin:'0 0 8px',color:'var(--text-m)'}});
    const pwBtnRow=d('',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
    const cancelBtn=b('btn-sec',{},'Cancel');
    const saveBtn=b('btn-pri',{},'Save password');
    pwBtnRow.appendChild(cancelBtn);pwBtnRow.appendChild(saveBtn);
    pwForm.appendChild(pwInput);pwForm.appendChild(pwConfirm);pwForm.appendChild(pwMsg);pwForm.appendChild(pwBtnRow);
    // Toggle button
    const pwToggle=b('btn-sec',{onClick:()=>{const open=pwForm.style.display==='block';pwForm.style.display=open?'none':'block';pwToggle.textContent=open?'Change':'Cancel';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';if(!open)setTimeout(()=>pwInput.focus(),40);}},
    'Change');
    pwRow.appendChild(pwToggle);
    pwRow.appendChild(pwForm);
    cancelBtn.addEventListener('click',()=>{pwForm.style.display='none';pwToggle.textContent='Change';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';});
    saveBtn.addEventListener('click',async()=>{
      const pw=pwInput.value,cf=pwConfirm.value;
      if(pw.length<8){pwMsg.style.color='#F47B5E';pwMsg.textContent='Minimum 8 characters.';return;}
      if(pw!==cf){pwMsg.style.color='#F47B5E';pwMsg.textContent='Passwords do not match.';return;}
      saveBtn.disabled=true;saveBtn.textContent='Saving…';pwMsg.textContent='';
      const{error}=await sb.auth.updateUser({password:pw});
      if(error){
        saveBtn.disabled=false;saveBtn.textContent='Save password';
        pwMsg.style.color='#F47B5E';pwMsg.textContent=error.message;
      } else {
        pwMsg.style.color='var(--accent)';pwMsg.textContent='Password updated successfully.';
        saveBtn.textContent='Saved';
        setTimeout(()=>{pwForm.style.display='none';pwToggle.textContent='Change';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';saveBtn.disabled=false;saveBtn.textContent='Save password';},2000);
      }
    });
    body.appendChild(pwRow);

    // ── Library
    body.appendChild(s('st-section','Local Library'));
    const libMeta=wtSession?.user.user_metadata;
    const libCount=libMeta?.library_track_count||0;
    const libScanned=libMeta?.library_scanned_at;
    const libScannedStr=libScanned?new Date(libScanned).toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'}):null;
    const libRow=d('st-row',{style:{flexWrap:'wrap',gap:'8px'}});
    const libLeft=d('',{style:{flex:'1',minWidth:'0'}});
    libLeft.appendChild(s('st-lbl','Music folder'));
    const libSubEl=s('st-sub',libScannedStr?`Last scanned: ${libScannedStr} · ${libCount} tracks`:'No folder linked yet');
    libLeft.appendChild(libSubEl);
    libRow.appendChild(libLeft);
    const scanBtn=b('btn-sec',{},libScannedStr?'Rescan':'Link folder');
    const scanMsg=el('p',{style:{flexBasis:'100%',fontSize:'12px',margin:'2px 0 0',minHeight:'0',display:'none'}});
    scanBtn.addEventListener('click',async()=>{
      if(!('showDirectoryPicker' in window)){
        scanMsg.style.display='block';scanMsg.style.color='#F47B5E';
        scanMsg.textContent='Folder linking requires Chrome or Edge.';return;
      }
      scanBtn.disabled=true;scanBtn.textContent='Scanning…';
      scanMsg.style.display='block';scanMsg.style.color='var(--text-m)';scanMsg.textContent='Opening folder…';
      try{
        const result=await linkLibrary((done,total)=>{
          scanMsg.textContent=total===0?'Collecting files…':`Parsing ${done} / ${total}…`;
        });
        if(result===null){
          scanBtn.disabled=false;scanBtn.textContent=libScannedStr?'Rescan':'Link folder';
          scanMsg.style.display='none';return;
        }
        scanMsg.style.color='var(--accent)';
        scanMsg.textContent=`Done — ${result.count} tracks indexed.`;
        libSubEl.textContent=`Last scanned: just now · ${result.count} tracks`;
        scanBtn.disabled=false;scanBtn.textContent='Rescan';
      }catch(e){
        scanMsg.style.color='#F47B5E';scanMsg.textContent=e.message;
        scanBtn.disabled=false;scanBtn.textContent=libScannedStr?'Rescan':'Link folder';
      }
    });
    libRow.appendChild(scanBtn);
    libRow.appendChild(scanMsg);
    body.appendChild(libRow);

    // ── Data
    body.appendChild(s('st-section','Data'));
    const histCount=st.history.length;
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Listen history'),s('st-sub',histCount+' track'+(histCount!==1?'s':'')+' played')),
      b('btn-sec',{onClick:()=>{if(confirm('Clear listen history?')){st.history=[];st.listens={};rr();}}},'Clear')
    ));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Mini-player position'),s('st-sub','Reset to default bottom-right corner')),
      b('btn-sec',{onClick:()=>{ytPos=null;localStorage.removeItem('wt-player-pos');rr();}},'Reset')
    ));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl st-danger','⚠ Reset all data'),s('st-sub','Erase all woods, nodes, likes and history')),
      b('btn-sec',{style:{borderColor:'#F47B5E',color:'#F47B5E'},onClick:()=>{if(confirm('Erase all data? This cannot be undone.')){localStorage.removeItem(SK);location.reload();}}},'Reset')
    ));

    modal.appendChild(body);
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  if(st.premiumModal){
    const overlay=d('overlay',{onClick:()=>{st.premiumModal=false;rr();}});
    const modal=d('modal premium-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('premium-modal-icon',{},'🔒'));
    modal.appendChild(el('h2',{cls:'modal-title',style:{textAlign:'center',fontSize:'17px'}},'Feature coming soon'));
    modal.appendChild(s('modal-sub','We\'re still working on this — it\'ll be available soon. Thanks for testing WaxTree!'));
    modal.appendChild(el('button',{cls:'btn-premium',onClick:()=>{st.premiumModal=false;rr();}},'Got it'));
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  return root;
}

sb.auth.onAuthStateChange((event)=>{
  if(event==='SIGNED_OUT')window.location.href='login.html';
});

sb.auth.getSession().then(({data:{session}})=>{
  if(!session){window.location.href='login.html';return;}
  wtSession=session;
  st.searchCount=wtSession.user.user_metadata?.search_count||0;
  st.ownedTracks=wtSession.user.user_metadata?.owned_tracks||[];
  st.isPremium=wtSession.user.user_metadata?.premium===true;
  paint();
  loadFollows();
  handleDiscogsCallback();
});

</script>
</body>
</html>
