// ── Track deduplication ────────────────────────────────────
function parseDur(d){if(!d)return 0;const p=d.split(':').map(Number);return p.length===2?p[0]*60+p[1]:p.length===3?p[0]*3600+p[1]*60+p[2]:0;}
function normalTitle(t){
  return t.toLowerCase()
    .replace(/\s*[\(\[](limited|special|collector'?s?|deluxe|colour?e?d?|promo|numbered|reissue|re-?press|remaster(?:ed)?|anniversary|hand[\s-]?stamp(?:ed)?|picture\s*disc|clear|splatter|vinyl)[\s\w,]*[\)\]]/gi,'')
    .replace(/\s*[\(\[](original(?:\s+mix)?|album(?:\s+version)?|lp(?:\s+version)?|extended(?:\s+version)?|single(?:\s+version)?|full(?:\s+version)?|radio\s*(?:edit|version)?|main(?:\s+version)?)[\)\]]/gi,'')
    .trim().replace(/\s+/g,' ');
}
function dedup(tracks){
  const seen=new Set();
  return tracks.filter(t=>{const dur=parseDur(t.duration);const b=dur>0?Math.floor(dur/30):-1;const k=`${normalTitle(t.title)}||${b}`;if(seen.has(k))return false;seen.add(k);return true;});
}

// ── Remix-artist detection ────────────────────────────────
// Parenthetical text that names a version/edit rather than a remixer —
// same non-remix vocabulary as normalTitle() above, kept in sync.
const REMIX_GENERIC_RE=/^(original(?:\s+mix)?|album(?:\s+version)?|lp(?:\s+version)?|extended(?:\s+version)?|single(?:\s+version)?|full(?:\s+version)?|radio\s*(?:edit|version)?|main(?:\s+version)?|instrumental|acapella|a\s*cappella|clean|dirty|explicit|bonus(?:\s+track)?|intro|outro|interlude|continuous\s*mix|unmixed|demo|live)$/i;
// Packaging descriptors (same vocabulary normalTitle() strips) — never a
// remixer either, e.g. "(Limited Edition)" next to a plain sibling track.
const REMIX_PACKAGING_RE=/^(limited|special|collector'?s?|deluxe|colour?e?d?|promo|numbered|reissue|re-?press|remaster(?:ed)?|anniversary|hand[\s-]?stamp(?:ed)?|picture\s*disc|clear|splatter|vinyl)\b/i;
// Generic mix/edit TYPE words — never the remixer's own name, even when
// they're the first word left after stripping a trailing keyword (e.g.
// "(Extended Mix)" -> "Extended" must NOT be read as an artist).
const REMIX_TYPE_WORD_RE=/^(original|album|lp|extended|single|full|radio|main|club|vocal|instrumental|acapella|dub|vip|clean|dirty|explicit|bonus|intro|outro|interlude|continuous|unmixed|demo|live|alternate|alternative|special|reprise|unreleased)$/i;
const REMIX_SUFFIX_RE=/^(.+?)\s+(?:remix|rmx|rework|refix|flip|bootleg|vip|edit|dub(?:\s*mix)?|mix|version)$/i;
function baseTitleKey(title){return title.replace(/\s*[\(\[][^\)\]]*[\)\]]/g,'').trim().toLowerCase().replace(/\s+/g,' ');}
// hasSibling: another track in the same release shares this track's base
// title (e.g. a plain "Alpha Decay" next to "Alpha Decay (Reshape)") — only
// then do we trust a bare, keyword-less parenthetical as a remixer's name.
// Returns the raw candidate PHRASE before the trailing type keyword (e.g.
// "Chevel Deconstructed", "Andrey Pushkarev") — whether the real alias is
// the whole phrase or just its first word is ambiguous from text alone
// ("Andrey Pushkarev Remix" is a two-word name; "Chevel Deconstructed Mix"
// is a one-word name plus a style descriptor) and gets resolved against
// real Discogs artist data by resolveRemixArtistCandidates() below.
function extractRemixCandidate(title,hasSibling){
  const groups=[...title.matchAll(/[\(\[]([^\)\]]+)[\)\]]/g)].map(m=>m[1].trim());
  for(const g of groups){
    if(!g||REMIX_GENERIC_RE.test(g)||REMIX_PACKAGING_RE.test(g))continue;
    const m=g.match(REMIX_SUFFIX_RE);
    const remainder=m?m[1].trim():(hasSibling?g:null);
    if(!remainder)continue;
    const firstWord=remainder.split(/\s+/)[0].replace(/['’]s$/i,'');
    if(firstWord&&!REMIX_TYPE_WORD_RE.test(firstWord)&&!REMIX_GENERIC_RE.test(firstWord))return remainder;
  }
  return null;
}

// ── API ────────────────────────────────────────────────────
// Every explored artist/label's full response (bio, images, up to 200
// tracks) gets cached under ct2:*. The 24h TTL only stops lsGet() from
// RETURNING a stale entry — it never actually deletes it, so for anyone
// with a large explored tree this cache grows forever and was found to be
// the dominant cause of localStorage quota exhaustion (which in turn broke
// Supabase's own session-token persistence, causing spontaneous sign-outs
// and a login that stayed broken even after clearing site data once).
function purgeExpiredCache(){
  const now=Date.now();
  let freed=0;
  for(let i=localStorage.length-1;i>=0;i--){
    const k=localStorage.key(i);
    if(!k||!k.startsWith('ct2:'))continue;
    try{
      const{t}=JSON.parse(localStorage.getItem(k));
      if(now-t>=86400000){localStorage.removeItem(k);freed++;}
    }catch{localStorage.removeItem(k);freed++;} // corrupted entry — drop it too
  }
  return freed;
}
function lsGet(k){try{const r=localStorage.getItem('ct2:'+k);if(!r)return null;const{d,t}=JSON.parse(r);if(Date.now()-t<86400000)return d;}catch{}return null;}
function lsSet(k,d){
  try{localStorage.setItem('ct2:'+k,JSON.stringify({d,t:Date.now()}));}
  catch(e){
    if(e.name!=='QuotaExceededError')return;
    const freed=purgeExpiredCache();
    if(freed)try{localStorage.setItem('ct2:'+k,JSON.stringify({d,t:Date.now()}));}catch{}
  }
}
function stripBio(t){return t.replace(/\[a\d*=([^\]]+)\]/g,'$1').replace(/\[l=([^\]]+)\]/g,'$1').replace(/\[url=[^\]]*\]([^[]*)\[\/url\]/g,'$1').replace(/\[[^\]]*\]/g,'').trim();}

let rqN=0,rqW=Date.now();
async function dReq(path,p={},_retry=0){
  const tok=getToken();
  if(!tok){
    try{return await edgeFn({action:'search',path,params:JSON.stringify(p)});}
    catch(e){
      if(_retry<3&&(e.message==='rate_limited'||e.message.includes('rate_limit'))){
        await new Promise(r=>setTimeout(r,15000*(1+_retry)));
        return dReq(path,p,_retry+1);
      }
      throw e;
    }
  }
  const now=Date.now();if(now-rqW>60000){rqN=0;rqW=now;}
  if(rqN>=45){await new Promise(r=>setTimeout(r,62000-(Date.now()-rqW)));rqN=0;rqW=Date.now();}rqN++;
  const url=new URL('https://api.discogs.com'+path);
  Object.entries(p).forEach(([k,v])=>url.searchParams.set(k,String(v)));
  let res;
  try{res=await fetch(url,{headers:{Authorization:`Discogs token=${tok}`}});}
  catch(e){
    if(_retry<2){await new Promise(r=>setTimeout(r,5000*(1+_retry)));return dReq(path,p,_retry+1);}
    throw e;
  }
  if(res.status===429){
    if(_retry<2){await new Promise(r=>setTimeout(r,12000*(1+_retry)));return dReq(path,p,_retry+1);}
    throw new Error('Rate limit — try again in a moment');
  }
  if(!res.ok)throw new Error(`Discogs ${res.status}`);return res.json();
}
async function searchDiscogs(q){
  const c=lsGet('s:'+q);if(c)return c;
  const data=await dReq('/database/search',{q,per_page:'25'});
  const r=data.results.filter(r=>r.type==='artist'||r.type==='label').map(r=>({id:r.id,type:r.type,title:r.title,thumb:r.thumb,uri:r.uri}));
  lsSet('s:'+q,r);return r;
}

// ── Remix-artist resolution ────────────────────────────────
// A candidate phrase like "Andrey Pushkarev" or "Chevel Deconstructed" is
// checked against real Discogs artist search results, longest word-count
// first — e.g. for "Chevel Deconstructed" it tries "Chevel Deconstructed"
// (no such artist), then "Chevel" (real artist, confirmed) — so the merged
// Explore dropdown only ever offers an option Discogs actually recognizes.
async function resolveRemixArtistCandidates(remainder){
  const words=remainder.split(/\s+/);
  let anySucceeded=false;
  for(let n=words.length;n>=1;n--){
    const candidate=words.slice(0,n).join(' ').replace(/['’]s$/i,'').trim();
    if(!candidate||REMIX_TYPE_WORD_RE.test(candidate)||REMIX_GENERIC_RE.test(candidate))continue;
    try{
      const results=await searchDiscogs(candidate);
      anySucceeded=true;
      const hit=results.find(r=>r.type==='artist'&&r.title.replace(/\s*\(\d+\)$/,'').toLowerCase()===candidate.toLowerCase());
      if(hit)return{name:hit.title,id:hit.id};
    }catch{/* try a shorter candidate */}
  }
  return anySucceeded?null:undefined; // null = confirmed no artist found; undefined = couldn't check (network) — retry later
}
const remixResolveInFlight=new Set();
// Synchronous cache lookup for use inside releaseCard()'s render — kicks
// off background resolution on first sight of a candidate and returns
// undefined (still resolving, show nothing yet) until resolveRemixArtistCandidates()
// settles and triggers a re-render via rr().
function getResolvedRemixArtist(remainder){
  const ck='remix:'+remainder.toLowerCase();
  const cached=lsGet(ck);
  if(cached!==null)return cached; // false (confirmed no match) or {name,id}
  if(!remixResolveInFlight.has(ck)){
    remixResolveInFlight.add(ck);
    resolveRemixArtistCandidates(remainder).then(result=>{
      remixResolveInFlight.delete(ck);
      if(result===undefined)return;
      lsSet(ck,result===null?false:result);
      rr();
    }).catch(()=>{remixResolveInFlight.delete(ck);});
  }
  return undefined;
}
// MusicBrainz: 1 req/sec limit enforced server-side
let mbLast=0;
async function mbFetch(url,_retry=0){
  const gap=Date.now()-mbLast;
  if(gap<1100)await new Promise(r=>setTimeout(r,1100-gap));
  mbLast=Date.now();
  let res;
  try{res=await fetch(url,{headers:{'User-Agent':'WaxTree/1.0 (luca.doots@gmail.com)'}});}
  catch(e){
    if(_retry<2){mbLast=0;await new Promise(r=>setTimeout(r,3000*(1+_retry)));return mbFetch(url,_retry+1);}
    throw e;
  }
  if(res.status===429||res.status===503){
    if(_retry<2){mbLast=0;await new Promise(r=>setTimeout(r,8000*(1+_retry)));return mbFetch(url,_retry+1);}
    throw new Error(`MusicBrainz ${res.status}`);
  }
  return res;
}
async function fetchMbCoverUrl(artist,title,year){
  const ck='mb:'+(artist+':'+title).toLowerCase().replace(/\s+/g,'');
  const cv=lsGet(ck);if(cv!==null)return cv||null;
  try{
    const q=encodeURIComponent(`release:"${title.replace(/"/g,'')}" AND artist:"${artist.replace(/"/g,'')}"${year?` AND date:${year}`:''}`);
    const res=await mbFetch(`https://musicbrainz.org/ws/2/release/?query=${q}&limit=5&fmt=json`);
    if(!res.ok){lsSet(ck,'');return null;}
    const{releases=[]}=await res.json();
    const hit=releases.find(r=>r['cover-art-archive']?.front&&(!year||r.date?.startsWith(String(year))))
      ||releases.find(r=>r['cover-art-archive']?.front);
    if(!hit?.id||!hit['cover-art-archive']?.front){lsSet(ck,'');return null;}
    const url=`https://coverartarchive.org/release/${hit.id}/front-250`;
    lsSet(ck,url);return url;
  }catch{lsSet(ck,'');return null;}
}

async function fetchWikipediaData(name,_retry=0){
  try{
    const res=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`);
    if(!res.ok)return null;
    const d=await res.json();
    if(d.type==='disambiguation'||!d.extract||d.extract.length<80)return null;
    return{bio:d.extract,imageUrl:d.thumbnail?.source||null};
  }catch(e){
    if(_retry<1){await new Promise(r=>setTimeout(r,2000));return fetchWikipediaData(name,_retry+1);}
    return null;
  }
}

function genreColor(g){
  if(GENRE_COLORS[g])return GENRE_COLORS[g];
  let h=5381;for(let i=0;i<g.length;i++)h=((h<<5)+h+g.charCodeAt(i))&0x7FFFFFFF;
  return['#E8834A','#4AB8E8','#9B59B6','#C8D840','#E84A4A','#4AE8A4','#E84A9E','#4A9EE8','#E8C84A','#8B4AE8','#4AE8C4','#E86A4A'][h%12];

// Discogs suffixes an artist name with " (N)" to disambiguate same-named
// artists (e.g. "Artist Name (2)") — strip it for display everywhere.
const stripDiscogsSuffix=n=>(n||'').replace(/\s\(\d+\)$/,'');
function buildTrackEntries(rd,fetchId,releaseUrl,relYear,relLabelHint,relThumb='',vinylTitles=null){
  const tracklist=(rd.tracklist||[]).filter(t=>t.type_!=='heading'&&t.title);
  if(!tracklist.length)return[];
  // A vinyl-with-download-code release is very common and Discogs represents
  // it as ONE "Vinyl" format entry whose descriptions mention the download,
  // not a separate "File" entry — miss that wording and a release that's
  // genuinely both ends up mislabeled "Only Vinyl".
  const isDigital=(rd.formats||[]).some(f=>/^file$/i.test(f.name)||(f.descriptions||[]).some(d=>/mp3|flac|wav|aac|digital|lossless|download/i.test(d)));
  // Discogs is treated as the authoritative, ~complete database for vinyl
  // specifically — a vinyl pressing and its digital-only counterpart are
  // often two separate release listings, so also check for a sibling entry
  // (same catalog, matching title) that IS vinyl before concluding there's
  // no vinyl pressing at all.
  const hasVinyl=(rd.formats||[]).some(f=>/vinyl/i.test(f.name))||!!vinylTitles?.has(normalizeStr(rd.title||''));
  const labelId=rd.labels?.[0]?.id||null;
  const labelName=rd.labels?.[0]?.name||relLabelHint||'';
  const year=rd.year||relYear;
  const videos=rd.videos||[];
  const normV=s=>s.toLowerCase().replace(/\b0+([1-9])/g,'$1').replace(/[^a-z0-9]/g,'');
  const tl=tracklist;
  const allTN=tl.map(t=>normV(t.title));
  function matchVideo(idx){
    const tn=allTN[idx];if(!videos.length||tn.length<4)return null;
    for(const v of videos){
      const vn=normV(v.title||'');
      if(!(vn.includes(tn)||tn.includes(vn)))continue;
      // Only assign if no OTHER track also matches this video
      const ambiguous=allTN.some((ot,j)=>j!==idx&&ot.length>=4&&(vn.includes(ot)||ot.includes(vn)));
      if(!ambiguous)return getYtId(v.uri);
    }
    return null;
  }
  const img=rd.images?.find(i=>i.type==='primary')||rd.images?.[0];
  const thumbUrl=img?.uri150||img?.uri||relThumb||null;
  const styleList=(rd.styles||[]).slice(0,2);
  const genre=styleList.length?styleList.join(' · '):(rd.genres?.[0]||null);
  // BPM: try release notes, then per-track notes
  const relNotes=(rd.notes||'');
  const relBpmM=relNotes.match(/\b(\d{2,3})\s*bpm\b/i)||relNotes.match(/bpm[:\s]+(\d{2,3})/i);
  const relBpm=relBpmM?parseInt(relBpmM[1]):null;
  return tl.map((t,i)=>{
    const tn=t.notes||'';const tbm=tn.match(/\b(\d{2,3})\s*bpm\b/i)||tn.match(/bpm[:\s]+(\d{2,3})/i);
    const bpm=tbm?parseInt(tbm[1]):relBpm;
    // Various Artists releases credit each track to its own artist(s) —
    // Discogs exposes this on the tracklist entry itself, distinct from the
    // single "Various" artist at the release level.
    const perTrack=(t.artists&&t.artists.length)?t.artists:null;
    const trackArtistName=perTrack?perTrack.map(a=>stripDiscogsSuffix(a.name)).join(', '):null;
    const trackArtistId=perTrack?perTrack[0].id:null;
    return{
    id:`${fetchId}-${t.position||i}`,title:t.title,duration:t.duration||'',
    year,label:labelName,labelId,genre,thumbUrl,bpm,album:rd.title||'',
    digital:isDigital,hasVinyl,discogsUrl:releaseUrl,videoId:matchVideo(i),catno:'',
    fromLabel:false,trackArtistName,trackArtistId,
    exploreId:null,exploreName:null,exploreType:null,exploreLabel:null
  };});
}

// Release-detail fetches were happening one at a time in a for-await loop —
// with a discography of 30+ releases that's 30+ sequential HTTP round trips
// before anything appears. Fetch in small parallel batches instead. Also pull
// the MusicBrainz cover fallback (server-mandated 1 req/sec) and the
// correlated-artists lookup out of the blocking path entirely: both patch
// into the already-returned `nd` object in the background and trigger a
// re-render (rr()) once ready, instead of making the whole discography wait
// on them.
const FETCH_BATCH=6;
async function fetchReleaseBatches(relList,capTracks,isCancelled,fetchOne){
  const rawTracks=[];
  const needsCover=[];
  for(let i=0;i<relList.length&&rawTracks.length<capTracks;i+=FETCH_BATCH){
    if(isCancelled())break;
    const batch=relList.slice(i,i+FETCH_BATCH);
    const results=await Promise.all(batch.map(async rel=>{
      try{return await fetchOne(rel);}catch{return null;}
    }));
    if(isCancelled())break;
    for(const r of results){
      if(!r)continue;
      rawTracks.push(...r.entries);
      if(r.needsCover)needsCover.push(r.needsCover);
    }
  }
  return{rawTracks,needsCover};
}
function resolveCoversInBackground(needsCover,cacheKey,isCancelled,nd){
  if(!needsCover.length)return;
  (async()=>{
    let patched=false;
    for(const item of needsCover){
      if(isCancelled())break;
      try{
        const mbUrl=await fetchMbCoverUrl(item.artistName,item.releaseTitle,item.year);
        if(mbUrl){item.entries.forEach(e=>e.thumbUrl=mbUrl);patched=true;rr();}
      }catch{}
    }
    if(patched)lsSet(cacheKey,nd); // persist the same (mutated) object so covers survive a reload
  })();
}

async function fetchArtistData(discogsId,isCancelled=()=>false,skipEnrichment=false){
  const c=lsGet('a7:'+discogsId);if(c&&c.tracks?.length&&c._v===TRACK_DATA_VERSION)return c;
  // Newest-first: fetchReleaseBatches below stops once it hits the 200-track
  // cap, so for a discography bigger than that, whichever end we start from
  // is the only end that ever gets fetched. Oldest-first meant a prolific
  // artist's most recent releases (often the ones actually worth digging
  // for) could be excluded entirely if their back catalog alone exceeded
  // the cap.
  const[artData,relData]=await Promise.all([
    dReq('/artists/'+discogsId),
    dReq('/artists/'+discogsId+'/releases',{per_page:'100',sort:'year',sort_order:'desc'})
  ]);
  const rawBio=artData.profile?stripBio(artData.profile):null;
  const imageUrl=artData.images?.find(i=>i.type==='primary')?.uri||artData.images?.[0]?.uri||null;
  const wikiP=(!rawBio||rawBio.length<60||!imageUrl)?fetchWikipediaData(artData.name):Promise.resolve(null);

  const mainRels=relData.releases.filter(r=>r.role==='Main');
  const relList=mainRels.length>0?mainRels:relData.releases;
  // Built from the same release list already in hand — no extra requests.
  // A vinyl pressing and its digital-only counterpart are frequently two
  // separate Discogs listings; this catches the vinyl one by title even
  // when the specific entry fetched below turns out to be the digital one.
  const vinylTitles=new Set(relData.releases.filter(r=>/vinyl/i.test(r.format||'')).map(r=>normalizeStr(r.title||'')));
  const{rawTracks,needsCover}=await fetchReleaseBatches(relList,200,isCancelled,async rel=>{
    let fetchId,releaseUrl,rd;
    if(rel.type==='master'){
      releaseUrl=`https://www.discogs.com/master/${rel.id}`;
      if(rel.main_release){fetchId=rel.main_release;rd=await dReq('/releases/'+fetchId);}
      else{fetchId='m'+rel.id;rd=await dReq('/masters/'+rel.id);}
    }else{
      fetchId=rel.id;releaseUrl=`https://www.discogs.com/release/${rel.id}`;
      rd=await dReq('/releases/'+fetchId);
    }
    const entries=buildTrackEntries(rd,fetchId,releaseUrl,rel.year,rel.label,rel.thumb||'',vinylTitles);
    const needsCoverItem=(entries.length&&!entries[0].thumbUrl)
      ?{entries,artistName:artData.name,releaseTitle:rd.title||rel.title||'',year:rd.year||rel.year}
      :null;
    return{entries,needsCover:needsCoverItem};
  });
  const tracks=dedup(rawTracks);
  const years=rawTracks.map(t=>t.year).filter(Boolean);
  const labels=[...new Set(rawTracks.map(t=>t.label).filter(Boolean))].slice(0,6);
  const minY=years.length?Math.min(...years):null,maxY=years.length?Math.max(...years):null;
  const wikiData=await wikiP;
  const bio=(rawBio&&rawBio.length>=60)?rawBio:(wikiData?.bio||rawBio||null);
  const lblCounts={};rawTracks.forEach(t=>{if(t.labelId)lblCounts[t.labelId]=(lblCounts[t.labelId]||0)+1;});
  const topLabelId=Object.entries(lblCounts).sort((a,b)=>b[1]-a[1])[0]?.[0];
  const nd={
    id:artData.id,name:artData.name,bio,
    imageUrl:imageUrl||wikiData?.imageUrl||null,
    aliases:(artData.aliases||[]).map(a=>({id:a.id,name:a.name,type:'artist'})),
    highlights:{yearRange:minY?(minY===maxY?String(minY):`${minY}–${maxY}`):null,names:labels,labelStr:labels.length?`Released on: ${labels.join(', ')}`:null},
    correlatedArtists:[],
    tracks,trackCount:relData.pagination.items,
    _v:TRACK_DATA_VERSION
  };
  lsSet('a7:'+discogsId,nd);

  // Background: correlated artists (secondary sidebar data) and missing cover art —
  // neither blocks the track list from appearing. Skipped when the caller
  // only needs .tracks (the library-Discogs matcher) — that data is never
  // displayed there, and each of these fires its own rr() (full app
  // re-render) whenever it resolves, which for a matcher checking dozens of
  // artists in a row meant the whole app kept re-rendering — and visibly
  // fighting the current scroll position — long after any given match
  // "finished", no matter what the user was actually looking at.
  if(!skipEnrichment){
    if(topLabelId){
      (async()=>{
        try{
          const lRel=await dReq('/labels/'+topLabelId+'/releases',{per_page:'30',sort:'year'});
          const seen=new Set([artData.name.toLowerCase().replace(/\s+/g,'')]);
          nd.correlatedArtists=lRel.releases
            .map(r=>r.artist||'').filter(n=>n&&!/^various$/i.test(n.trim()))
            .map(n=>({name:n,k:n.toLowerCase().replace(/\s+/g,'')}))
            .filter(a=>{if(seen.has(a.k))return false;seen.add(a.k);return true;})
            .slice(0,10).map(a=>a.name);
          lsSet('a7:'+discogsId,nd);rr();
        }catch{}
      })();
    }
    resolveCoversInBackground(needsCover,'a7:'+discogsId,isCancelled,nd);
  }

  return nd;
}

async function fetchLabelData(discogsId,isCancelled=()=>false){
  const c=lsGet('l8:'+discogsId);if(c&&c._v===TRACK_DATA_VERSION)return c;
  // Newest-first — see fetchArtistData()'s comment above the same change.
  // A label with a big back catalog was showing releases up to ~2020 and
  // no newer, digital-only ones included, purely because the 200-track cap
  // was being spent walking oldest-to-newest and never got there.
  const[labData,relData]=await Promise.all([
    dReq('/labels/'+discogsId),
    dReq('/labels/'+discogsId+'/releases',{per_page:'100',sort:'year',sort_order:'desc'})
  ]);
  const rawBio=labData.profile?stripBio(labData.profile):null;
  const labImgUrl=labData.images?.find(i=>i.type==='primary')?.uri||labData.images?.[0]?.uri||null;
  const wikiP=(!rawBio||rawBio.length<60||!labImgUrl)?fetchWikipediaData(labData.name):Promise.resolve(null);

  // Built from the same release list already in hand — no extra requests.
  // A vinyl pressing and its digital-only counterpart are frequently two
  // separate Discogs listings; this catches the vinyl one by title even
  // when the specific entry fetched below turns out to be the digital one.
  const vinylTitles=new Set(relData.releases.filter(r=>/vinyl/i.test(r.format||'')).map(r=>normalizeStr(r.title||'')));
  const{rawTracks,needsCover}=await fetchReleaseBatches(relData.releases,200,isCancelled,async rel=>{
    const rd=await dReq('/releases/'+rel.id);
    const artistId=rd.artists?.[0]?.id||null;
    const artistName=stripDiscogsSuffix(rd.artists?.[0]?.name||rel.artist||'');
    const entries=buildTrackEntries(rd,rel.id,`https://www.discogs.com/release/${rel.id}`,rel.year,artistName,rel.thumb||'',vinylTitles);
    entries.forEach(e=>{
      // Various Artists release: use the per-track credit instead of the
      // release-level "Various" placeholder, for both the displayed
      // artist name and the "Explore artist" button's target.
      const realName=e.trackArtistName||artistName;
      const realId=e.trackArtistId||artistId;
      e.label=realName;e.labelId=null;e.fromLabel=true;
      e.exploreId=realId;e.exploreName=realId?realName:null;e.exploreType='artist';e.exploreLabel='Explore artist';
      e.catno=rd.labels?.[0]?.catno||rel.catno||'';
    });
    const needsCoverItem=(entries.length&&!entries[0].thumbUrl)
      ?{entries,artistName,releaseTitle:rd.title||rel.title||'',year:rd.year||rel.year}
      :null;
    return{entries,needsCover:needsCoverItem};
  });
  const tracks=dedup(rawTracks);
  const years=rawTracks.map(t=>t.year).filter(Boolean);
  const artists=[...new Set(rawTracks.map(t=>t.label).filter(Boolean))].slice(0,8);
  const minY=years.length?Math.min(...years):null,maxY=years.length?Math.max(...years):null;
  const wikiData=await wikiP;
  const bio=(rawBio&&rawBio.length>=60)?rawBio:(wikiData?.bio||rawBio||null);
  const nd={
    id:labData.id,name:labData.name,bio,
    imageUrl:labImgUrl||wikiData?.imageUrl||null,
    sublabels:(labData.sublabels||[]).map(s=>({id:s.id,name:s.name,type:'label'})),
    parentLabel:labData.parent_label?{id:labData.parent_label.id,name:labData.parent_label.name,type:'label'}:null,
    country:labData.country||null,
    highlights:{yearRange:minY?(minY===maxY?String(minY):`${minY}–${maxY}`):null,names:artists,artistStr:artists.length?`Artists include: ${artists.slice(0,5).join(', ')}`:null},
    tracks,trackCount:relData.pagination.items,
    _v:TRACK_DATA_VERSION
  };
  lsSet('l8:'+discogsId,nd);
  resolveCoversInBackground(needsCover,'l8:'+discogsId,isCancelled,nd);
  return nd;
}

// ── Actions ────────────────────────────────────────────────
function getNode(id){return st.nodes.find(n=>n.id===id);}
function getBranch(id){return st.branches.find(b=>b.id===id);}
function ancestry(nodeId){const c=[];let id=nodeId;while(id){const n=getNode(id);if(!n)break;c.unshift(n);id=n.parentId;}return c;}

async function fetchBandcamp(nodeId,artistName){
  if(bcCacheMap[nodeId])return;
  bcCacheMap[nodeId]={tracks:[],loading:true,err:null};
  rr();
  try{
    const{data,error}=await sb.functions.invoke('bc-search',{body:{artist:artistName}});
    if(error)throw new Error(error.message);
    bcCacheMap[nodeId]={tracks:data?.tracks||[],loading:false,err:null};
  }catch(e){
    bcCacheMap[nodeId]={tracks:[],loading:false,err:e.message};
  }
  rr();
}

// Per-node load generation — each node cancels only its OWN previous
// in-flight fetch (e.g. a fast double retry), never another node's.
// A single shared counter here previously meant clicking Explore on
// node B silently cancelled node A's still-loading fetch, leaving A
// stuck at loading:true forever once its (discarded) response arrived.
const nodeLoadGen={};
function startNodeLoad(nodeId){
  const myGen=(nodeLoadGen[nodeId]=(nodeLoadGen[nodeId]||0)+1);
  return ()=>nodeLoadGen[nodeId]!==myGen;
}
function addNode(type,discogsId,name,parentId,branchId){
  const bid=branchId||st.activeBranchId;
  const existing=st.nodes.find(n=>n.discogsId===discogsId&&n.branchId===bid);
  if(existing){selectNode(existing.id);return;}
  if(!st.isPremium&&st.nodes.filter(n=>n.branchId===bid).length>=FREE_NODE_LIMIT){st.premiumModal=true;rr();return;}
  const id='n'+Date.now();
  const node={id,branchId:bid,type,discogsId,name,parentId:parentId||null,pinned:false,tags:[],loaded:false,loading:true,error:null,data:null};
  st.nodes=[...st.nodes,node];st.selectedId=id;st.activeBranchId=bid;
  st.filterOpen=false;st.filterTitle='';st.filterFormat='all';st.filterSort='default';st.filterGenres=[];
  if(!st.chips.includes(name))st.chips=[name,...st.chips.slice(0,11)];
  rr();
  const cancelled=startNodeLoad(id);
  const fn=type==='label'?fetchLabelData:fetchArtistData;
  fn(discogsId,cancelled).then(d=>{
    if(cancelled())return;
    const n=getNode(id);if(n){n.data=d;n.loaded=true;n.loading=false;}rr();
    fetchBandcamp(id,d?.name||name);
  }).catch(e=>{
    if(cancelled())return;
    const n=getNode(id);if(n){n.error=e.message;n.loading=false;}rr();
  });
}
function retryNode(nodeId){
  const node=getNode(nodeId);if(!node)return;
  node.error=null;node.loading=true;rr();
  const cancelled=startNodeLoad(nodeId);
  const fn=node.type==='label'?fetchLabelData:fetchArtistData;
  fn(node.discogsId,cancelled).then(d=>{
    if(cancelled())return;
    const n=getNode(nodeId);if(n){n.data=d;n.loaded=true;n.loading=false;}rr();
    fetchBandcamp(nodeId,d?.name||node.name);
  }).catch(e=>{
    if(cancelled())return;
    const n=getNode(nodeId);if(n){n.error=e.message;n.loading=false;}rr();
  });
}
function removeNode(nodeId){
  st.nodes.forEach(n=>{if(n.parentId===nodeId)n.parentId=null;});
  st.nodes=st.nodes.filter(n=>n.id!==nodeId);
  if(st.selectedId===nodeId)st.selectedId=st.nodes.filter(n=>n.branchId===st.activeBranchId).at(-1)?.id||null;
  rr();
}
function moveNodeToBranch(nodeId,targetBranchId){
  const node=getNode(nodeId);if(!node||node.branchId===targetBranchId)return;
  function moveSubtree(id){
    const n=getNode(id);if(!n)return;
    n.branchId=targetBranchId;
    st.nodes.filter(c=>c.parentId===id).forEach(c=>moveSubtree(c.id));
  }
  moveSubtree(nodeId);
  node.parentId=null;
  st.activeBranchId=targetBranchId;st.selectedId=nodeId;rr();
}
function selectNode(id){
  st.selectedId=id;const n=getNode(id);if(n)st.activeBranchId=n.branchId;
  st.filterOpen=false;st.filterTitle='';st.filterFormat='all';st.filterSort='default';st.filterGenres=[];
  // A node restored from the cloud backup (or never fully loaded) has no
  // cached Discogs data — fetch it now instead of rendering an empty panel.
  ensureNodeLoaded(id);
  // Silently re-fetch an artist/label node that was added before a
  // track-data fix — otherwise it keeps showing whatever was baked into it
  // back then forever.
  if(n&&(n.type==='label'||n.type==='artist')&&n.loaded&&!n.loading&&n.data?._v!==TRACK_DATA_VERSION)retryNode(id);
  rr();
}
function togglePin(id){const n=getNode(id);if(n)n.pinned=!n.pinned;rr();}
function addTag(nodeId,tag){
  const t=tag.trim().replace(/^#/,'');if(!t)return;
  const n=getNode(nodeId);if(n&&!n.tags.includes(t))n.tags=[...n.tags,t];
  st.tagNodeId=null;st.tagVal='';rr();
}
function removeTag(nodeId,tag){const n=getNode(nodeId);if(n)n.tags=n.tags.filter(t=>t!==tag);rr();}
function toggleLike(id){st.likes[id]=!st.likes[id];rr();}
function removeChip(name){st.chips=st.chips.filter(c=>c!==name);rr();}
function addBranch(){if(!st.isPremium&&st.branches.length>=FREE_WOOD_LIMIT){st.premiumModal=true;rr();return;}const id='b'+Date.now();st.branches=[...st.branches,{id,name:'Branch '+(st.branches.length+1)}];st.activeBranchId=id;rr();}
function removeBranch(id){
  if(st.branches.length<=1)return;
  st.branches=st.branches.filter(b=>b.id!==id);st.nodes=st.nodes.filter(n=>n.branchId!==id);
  if(st.activeBranchId===id)st.activeBranchId=st.branches[0].id;
  if(!getNode(st.selectedId))st.selectedId=st.nodes.filter(n=>n.branchId===st.activeBranchId).at(-1)?.id||null;rr();
}
function renameBranch(id,name){const b=getBranch(id);if(b&&name.trim())b.name=name.trim();st.renameId=null;rr();}
// Live search-as-you-type: doSearch (Enter/button) does an immediate lookup and
// auto-picks a single result; liveSearchTick (debounced, on every keystroke) only
// ever populates the suggestion dropdown, never auto-navigates and never counts
// toward the search-count gamification metric. searchGen guards against an older
// in-flight request overwriting results from a newer, still-being-typed query.
let searchDebTimer=null,searchGen=0;
function doSearch(){
  if(searchDebTimer){clearTimeout(searchDebTimer);searchDebTimer=null;}
  const q=st.q.trim();if(!q)return;
  const myGen=++searchGen;
  st.loading=true;st.err='';st.results=[];rr();
  searchDiscogs(q).then(res=>{
    if(myGen!==searchGen)return;
    st.loading=false;incrementSearch();
    if(!res.length){st.err='No results';rr();return;}
    if(res.length===1){pickResult(res[0]);return;}
    st.results=res;rr();
  }).catch(e=>{if(myGen!==searchGen)return;st.loading=false;st.err=e.message;rr();});
}

  const q=st.q.trim();

}

function applyFilters(tracks){
  let r=tracks.filter(t=>{
    if(st.filterTitle&&!t.title.toLowerCase().includes(st.filterTitle.toLowerCase()))return false;
    if(st.filterFormat==='digital'&&!t.digital)return false;
    if(st.filterFormat==='vinyl'&&t.digital)return false;
    if(st.filterGenres.length){
      const tg=t.genre?t.genre.split(' · '):[];
      if(!st.filterGenres.some(g=>tg.includes(g)))return false;
    }
    return true;
  });
  // yr() treats year=0 or missing as -1 so those sort last (not first) when descending
  const yr=t=>(t.year&&t.year>0)?t.year:-1;
  switch(st.filterSort){
    case 'chrono':     r=[...r].sort((a,b)=>yr(a)-yr(b));break;
    case 'antichrono': r=[...r].sort((a,b)=>yr(b)-yr(a));break;
    case 'az':         r=[...r].sort((a,b)=>a.title.localeCompare(b.title,'en'));break;
    case 'za':         r=[...r].sort((a,b)=>b.title.localeCompare(a.title,'en'));break;
    case 'genre':      r=[...r].sort((a,b)=>(a.genre||'zzz').localeCompare(b.genre||'zzz','en'));break;
    default:
      // Newest first. Within same year, tracks with a video ID come before those without.
      // Does NOT read invalidYtIds (mutated async) — keeps the comparator pure and consistent.
      r=[...r].sort((a,b)=>{
        const yd=yr(b)-yr(a);
        if(yd!==0)return yd;
        return (b.videoId?1:0)-(a.videoId?1:0);
      });
      break;
  }
  return r;
}

  for(const c of ch.flat(9)){if(c==null||c===false)continue;e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);}
  return e;
}

function classifyError(msg){
  const m=(msg||'').toLowerCase();
  if(m.includes('rate_limit')||m.includes('rate limit')||m.includes('too many'))
    return{title:'Discogs è occupato',sub:'Troppi artisti aperti di fila. Aspetta un secondo e riprova.',retry:true};
  if(m.includes('failed to fetch')||m.includes('networkerror')||m.includes('network')||m.includes('load failed'))
    return{title:'Nessuna connessione',sub:'Controlla la rete e riprova.',retry:true};
  if(m.includes('timeout')||m.includes('timed out')||m.includes('aborted'))
    return{title:'Risposta troppo lenta',sub:'La richiesta ha impiegato troppo tempo. Riprova tra un momento.',retry:true};
  if(m.includes('503')||m.includes('502')||m.includes('500')||m.includes('offline'))
    return{title:'Discogs non risponde',sub:'Il servizio è momentaneamente offline. Riprova tra poco.',retry:true};
  if(m.includes('404')||m.includes('not found'))
    return{title:'Non trovato su Discogs',sub:'Questo artista o label potrebbe non esistere più.',retry:false};
  return{title:'Qualcosa è andato storto',sub:'Riprova, o cerca un altro artista.',retry:true};
}

// ── Bandcamp direct-URL matcher ────────────────────────────
function findBcMatch(parentNodeId,title){
  const bc=bcCacheMap[parentNodeId];
  if(!bc||!bc.tracks.length)return null;
  // Aggressive normalization: lowercase, keep only letters/digits/spaces
  const norm=s=>s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
  const t=norm(title);
  if(!t)return null;
  const tWords=t.split(' ').filter(w=>w.length>1);

  let bestScore=0,bestUrl=null;
  for(const r of bc.tracks){
    if(!r.url||!r.title)continue;
    const bt=norm(r.title);
    // 1. Exact
    if(bt===t)return r.url;
    // 2. One contains the other → score by length ratio
    if(bt.includes(t)||t.includes(bt)){
      const sc=Math.min(t.length,bt.length)/Math.max(t.length,bt.length);
      if(sc>bestScore){bestScore=sc;bestUrl=r.url;}
      continue;
    }
    // 3. Word overlap → score = overlap / max(tWords, btWords)
    const btWords=bt.split(' ').filter(w=>w.length>1);
    const overlap=tWords.filter(w=>btWords.includes(w)).length;
    if(tWords.length>0&&btWords.length>0){
      const sc=overlap/Math.max(tWords.length,btWords.length);
      if(sc>=0.5&&sc>bestScore){bestScore=sc;bestUrl=r.url;}
    }
  }
  return bestScore>=0.5?bestUrl:null;
}

const AVATAR_KEY='wt-avatar';
async function uploadAvatar(file){
  if(file.size>10*1024*1024)throw new Error('Photo must be under 10 MB');
  const dataUrl=await new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=e=>{
      const img=new Image();
      img.onerror=reject;
      img.onload=()=>{
        const MAX=200;
        const ratio=Math.min(MAX/img.width,MAX/img.height,1);
        const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
        const cv=document.createElement('canvas');
        cv.width=w;cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',0.82));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
  localStorage.setItem(AVATAR_KEY,dataUrl);
  return dataUrl;
}
function getAvatarUrl(){return localStorage.getItem(AVATAR_KEY)||null;}

function groupTracksByRelease(tracks){
  const groups=[];
  const byKey=new Map();
  for(const t of tracks){
    const key=t.discogsUrl||t.id; // release-level, identical for every track of that release
    let g=byKey.get(key);
    if(!g){g={key,tracks:[]};byKey.set(key,g);groups.push(g);}
    g.tracks.push(t);
  }
  return groups;
}

function releaseCard(group,parentNodeId,isLabel,nodeName){
  const tracks=group.tracks;
  const first=tracks[0];

  // Release artwork (identical thumbUrl across the group)
  const art=first.thumbUrl
    ?el('img',{cls:'t-art',src:first.thumbUrl,alt:'',loading:'lazy'})
    :d('t-art-ph',{},'♫');

  // ── LEFT: one compact row per track, each with its own small play button
  const trackRows=tracks.map(track=>{
    const displayArtist=isLabel?track.label:nodeName;
    const liked=!!st.likes[track.id],badged=!!st.listens[track.id]?.badged;
    const owned=isOwned(track.title,displayArtist);
    // Every track without a Discogs video is a candidate here, not just
    // the one the user happens to click play on — bounded by
    // tryYtKickoffBudget()'s rolling time window so a big tracklist
    // resolves gradually instead of one API-quota-draining burst. A cache
    // hit from an earlier attempt (this render or a previous one) applies
    // immediately, no budget spent.
    let resolvedVideoId=track.videoId;
    if(!resolvedVideoId){
      if(track.id in ytMatches){
        resolvedVideoId=ytMatches[track.id]||null;
      }else if(ytAutoMatchInFlight.has(track.id)||tryYtKickoffBudget()){
        resolveTrackVideoId(track.id,track.title,displayArtist,track.duration,isLabel?nodeName:track.label);
      }
    }
    const videoOk=resolvedVideoId&&!invalidYtIds.has(resolvedVideoId);
    const playBtn=b('rel-play'+(videoOk?' has-video':''),{
      title:videoOk?'Play':'Search on YouTube',
      onClick:()=>doPlay(track.id,resolvedVideoId,track.title,displayArtist)
    },'▶');

    const inDaq=st.dasAscoltare.some(q=>q.id===track.id);
    const isDropOpen=st.playlistDropId===track.id;
    const trackWithArtist={...track,artistName:displayArtist};
    const plWrap=d('pl-wrap',{});
    const plBtn=b('t-daq'+(inDaq?' queued':''),{
      title:'Add to playlist',
      onClick:e=>{e.stopPropagation();st.playlistDropId=isDropOpen?null:track.id;rr();}
    },'🏷️');
    plWrap.appendChild(plBtn);
    if(isDropOpen){
      const drop=d('pl-drop',{onClick:e=>e.stopPropagation()});
      const llItem=b('pl-drop-item'+(inDaq?' checked':''),{onClick:()=>{
        if(inDaq)st.dasAscoltare=st.dasAscoltare.filter(q=>q.id!==track.id);
        else st.dasAscoltare=[...st.dasAscoltare,trackWithArtist];
        st.playlistDropId=null;rr();
      }},inDaq?'✓ Listen Later':'Listen Later');
      drop.appendChild(llItem);
      st.playlists.forEach(pl=>{
        const inPl=pl.tracks.some(t=>t.id===track.id);
        const plItem=b('pl-drop-item'+(inPl?' checked':''),{onClick:()=>{
          if(inPl)pl.tracks=pl.tracks.filter(t=>t.id!==track.id);
          else pl.tracks=[...pl.tracks,trackWithArtist];
          st.playlistDropId=null;rr();
        }},inPl?'✓ '+pl.name:pl.name);
        drop.appendChild(plItem);
      });
      drop.appendChild(d('pl-drop-sep',{}));
      drop.appendChild(b('pl-drop-item pl-drop-new',{onClick:()=>{
        const name=prompt('Playlist name:','');
        if(!name?.trim())return;
        st.playlists=[...st.playlists,{id:'pl-'+Date.now(),name:name.trim(),tracks:[trackWithArtist]}];
        st.playlistDropId=null;rr();
      }},'+ New playlist'));
      plWrap.appendChild(drop);
      setTimeout(()=>{const h=()=>{st.playlistDropId=null;rr();document.removeEventListener('click',h);};document.addEventListener('click',h);},0);
    }

    return d('rel-track-row',{},
      playBtn,
      s('rel-track-title',track.title),
      track.duration?s('t-dur',track.duration):null,
      b('t-like'+(liked?' liked':''),{onClick:()=>toggleLike(track.id)},liked?'♥':'♡'),
      plWrap,
      owned?s('own-badge','In your digital library'):null,
      inDiscogsCollection(track)?s('coll-badge','In collection'):null,
      inDiscogsWantlist(track)?s('want-badge','On wantlist'):null,
      badged?s('t-badge','✓ played'):null,
      track.bpm?s('t-bpm',track.bpm+' BPM'):null,
    );
  });

  // ── MIDDLE: release/EP/Album title + year·label + genres (release-level, shown once)
  // In a label's own catalog, track.label actually holds the per-track
  // ARTIST credit (see fetchLabelData) — when a release has more than one
  // distinct one, it's a Various Artists release and showing just
  // tracks[0]'s artist there is misleading.
  const isVariousArtists=isLabel&&new Set(tracks.map(t=>t.label).filter(Boolean)).size>1;
  const yearLabel=[first.year,isVariousArtists?'Various Artists':first.label].filter(Boolean).join(' · ');
  const genres=first.genre?first.genre.split(' · '):[];
  const mid=d('rel-mid',{},
    s('rel-title',first.album||first.title),
    yearLabel?s('t-meta',yearLabel):null,
    genres.length?d('t-meta-row',{},
      ...genres.map(g=>{const c=genreColor(g);return el('span',{cls:'genre-badge',style:`background:${c}1A;border-color:${c}66;color:${c}`},g);})
    ):null
  );

  // ── RIGHT: explore + buy buttons (release-level; explore-artist deduped across
  // the group since a Various Artists release can credit a different artist per track)
  const exploreEntries=[];
  if(first.label&&!first.fromLabel){
    exploreEntries.push({
      cls:'esplora-label',
      text:`Explore label: ${first.label}`,
      onClick:()=>{
        if(first.labelId)addNode('label',first.labelId,first.label,parentNodeId,getNode(parentNodeId)?.branchId);
        else{st.q=first.label;doSearch();}
      }
    });
  }
  const seenArtists=new Set();
  tracks.forEach(track=>{
    if(!track.exploreName)return;
    const key=track.exploreId||track.exploreName;
    if(seenArtists.has(key))return;
    seenArtists.add(key);
    exploreEntries.push({
      cls:track.fromLabel?'esplora-label':'',
      text:`${track.exploreLabel||'Explore'}: ${track.exploreName}`,
      onClick:()=>addNode(track.exploreType||'artist',track.exploreId,track.exploreName,parentNodeId,getNode(parentNodeId)?.branchId)
    });
  });

  // Remix artists parsed straight out of track titles (e.g. "Alpha Decay
  // (Reshape Mix)") fold into this same explore control as extra menu
  // entries — see extractRemixCandidate() — rather than a separate button.
  // Each candidate is verified against real Discogs artist data before it's
  // ever shown (getResolvedRemixArtist), so a two-word alias like "Andrey
  // Pushkarev" doesn't get truncated to just its first word.
  const baseTitleCounts=new Map();
  tracks.forEach(t=>{const k=baseTitleKey(t.title);baseTitleCounts.set(k,(baseTitleCounts.get(k)||0)+1);});
  const remixCandidates=new Set();
  tracks.forEach(t=>{
    const candidate=extractRemixCandidate(t.title,baseTitleCounts.get(baseTitleKey(t.title))>1);
    if(candidate)remixCandidates.add(candidate);
  });
  const remixResolved=[];
  remixCandidates.forEach(candidate=>{
    const resolved=getResolvedRemixArtist(candidate);
    if(resolved)remixResolved.push(resolved);
  });
  remixResolved.forEach(({name,id})=>exploreEntries.push({
    cls:'',
    text:`Explore remix artist: ${name}`,
    onClick:()=>addNode('artist',id,name,parentNodeId,getNode(parentNodeId)?.branchId)
  }));

  // Any time there's more than one target (multiple distinct artists on a
  // Various Artists release, a remix credit, or both) they fold into one
  // dropdown instead of a row of separate buttons — a single target still
  // renders as the plain inline button it always has.
  let exploreEls;
  if(exploreEntries.length>1){
    const exploreOpen=st.exploreDropKey===group.key;
    const highlighted=exploreEntries.some(en=>en.cls==='esplora-label');
    const wrap=d('explore-wrap',{});
    wrap.appendChild(b('esplora-btn explore-toggle'+(highlighted?' esplora-label':''),{
      onClick:e=>{e.stopPropagation();st.exploreDropKey=exploreOpen?null:group.key;rr();}
    },exploreOpen?'Explore ▴':'Explore ▾'));
    if(exploreOpen){
      const drop=d('pl-drop',{onClick:e=>e.stopPropagation()});
      exploreEntries.forEach(en=>drop.appendChild(b('pl-drop-item',{onClick:()=>{st.exploreDropKey=null;en.onClick();}},en.text)));
      wrap.appendChild(drop);
      setTimeout(()=>{const h=()=>{st.exploreDropKey=null;rr();document.removeEventListener('click',h);};document.addEventListener('click',h);},0);
    }
    exploreEls=[wrap];
  }else{
    exploreEls=exploreEntries.map(en=>b('esplora-btn'+(en.cls?' '+en.cls:''),{onClick:en.onClick},`${en.text} ›`));
  }

  const releaseTitle=first.album||first.title;
  const bcDirect=findBcMatch(parentNodeId,releaseTitle)||tracks.map(t=>findBcMatch(parentNodeId,t.title)).find(Boolean);
  const bcBtn=b('buy-btn bc'+(bcDirect?' direct':''),{
    title:bcDirect?'Go to Bandcamp':'Search on Bandcamp',
    onClick:async(e)=>{
      // Se abbiamo già un URL diretto dalla cache artista, usalo subito
      if(bcDirect){window.open(bcDirect,'_blank','noreferrer');return;}
      // Apri subito un tab vuoto (nel gesture handler) per evitare popup blocker
      const win=window.open('about:blank','_blank');
      const btn=e.currentTarget;
      btn.textContent='…';btn.style.opacity='0.55';
      const bcArtist=isLabel?(first.label||''):nodeName;
      let finalUrl=`https://bandcamp.com/search?q=${encodeURIComponent(releaseTitle)}&item_type=a`;
      try{
        const{data}=await sb.functions.invoke('bc-search',{body:{artist:bcArtist,title:releaseTitle,release:releaseTitle}});
        if(data?.tracks?.[0]?.url)finalUrl=data.tracks[0].url;
      }catch(err){console.error('[BC error]',err?.message||err);}
      btn.textContent='Bandcamp ↗';btn.style.opacity='';
      if(win&&!win.closed)win.location.href=finalUrl;
      else window.open(finalUrl,'_blank','noreferrer');
    }
  },'Bandcamp ↗');

  const buyBtns=[bcBtn,
    el('a',{cls:'buy-btn bp',href:`https://www.beatport.com/search?q=${encodeURIComponent(releaseTitle)}`,target:'_blank',rel:'noreferrer'},'Beatport ↗'),
  ];
  // Discogs is a crate-digger's marketplace/database for physical media —
  // a release with no vinyl pressing at all (digital-only) has nothing to
  // redirect to there. A release bundling both digital and vinyl formats
  // still gets the button.
  const digitalOnly=first.digital&&!first.hasVinyl;
  if(first.discogsUrl&&!digitalOnly)buyBtns.push(el('a',{cls:'buy-btn dg',href:first.discogsUrl,target:'_blank',rel:'noreferrer'},'Discogs ↗'));

  return d('rel-card',{},
    art,
    mid,
    d('rel-tracks',{},...trackRows),
    d('t-actions',{},
      d('t-act-explore',{},...exploreEls),
      d('t-act-buy',{},...buyBtns),
    ),
  );
}

// ── Sidebar ────────────────────────────────────────────────
function buildSidebar(){
  const bar=d('sidebar',{});
  const strip=d('br-strip',{});
  st.branches.forEach(branch=>{
    const isActive=st.activeBranchId===branch.id;
    const tab=d('br-tab'+(isActive?' active':''),{
      onClick:e=>{if(st.renameId===branch.id)return;st.activeBranchId=branch.id;rr();},
      onDblclick:e=>{e.stopPropagation();st.renameId=branch.id;st.renameVal=branch.name;rr();},
    });
    // Drag-over: accept drops to move node into this branch
    tab.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';tab.classList.add('drag-over');});
    tab.addEventListener('dragleave',()=>tab.classList.remove('drag-over'));
    tab.addEventListener('drop',e=>{e.preventDefault();tab.classList.remove('drag-over');const nid=e.dataTransfer.getData('text/plain');if(nid)moveNodeToBranch(nid,branch.id);});
    if(st.renameId===branch.id){
      const inp=el('input',{cls:'br-tab-rename',value:st.renameVal,
        onInput:e=>{st.renameVal=e.target.value;},
        onKeydown:e=>{if(e.key==='Enter'){e.preventDefault();renameBranch(branch.id,st.renameVal);}if(e.key==='Escape'){st.renameId=null;rr();}e.stopPropagation();},
        onBlur:()=>renameBranch(branch.id,st.renameVal),onClick:e=>e.stopPropagation(),
      });
      tab.appendChild(inp);setTimeout(()=>{inp.focus();inp.select();},0);
    } else {
      tab.appendChild(s('br-tab-name',branch.name));
      const ed=b('br-tab-edit',{title:'Rename',onClick:e=>{e.stopPropagation();st.renameId=branch.id;st.renameVal=branch.name;rr();}});ed.textContent='✎';tab.appendChild(ed);
      if(st.branches.length>1){const rm=b('br-tab-rm',{title:'Delete',onClick:e=>{e.stopPropagation();if(confirm(`Delete "${branch.name}"?`))removeBranch(branch.id);}});rm.textContent='×';tab.appendChild(rm);}
    }
    strip.appendChild(tab);
  });
  if(!st.isPremium&&st.branches.length>=FREE_WOOD_LIMIT){const lt=d('br-tab locked',{title:'Feature soon unlocked',onClick:()=>{st.premiumModal=true;rr();}});lt.appendChild(s('br-tab-name','Branch '+(FREE_WOOD_LIMIT+1)));lt.appendChild(s('br-tab-lock','🔒'));strip.appendChild(lt);}
  if(st.isPremium||st.branches.length<FREE_WOOD_LIMIT)strip.appendChild(b('br-add',{title:'New branch',onClick:addBranch},'+'));
  bar.appendChild(strip);

  // Filter bar
  const sfb=d('sb-filter',{});
  sfb.appendChild(b('sb-filter-pill'+(st.sbPinFirst?' on':''),{title:'Show pinned first',onClick:()=>{st.sbPinFirst=!st.sbPinFirst;rr();}},'📌 Pinned first'));
  bar.appendChild(sfb);

  const nodesWrap=d('sb-nodes',{'data-sc':'sb'});
  const branchNodes=st.nodes.filter(n=>n.branchId===st.activeBranchId);

  // Build tag dropdown from existing tags in branch
  const allTags=[...new Set(branchNodes.flatMap(n=>n.tags||[]))].sort();
  if(!allTags.includes(st.sbFilterTag))st.sbFilterTag='';
  const tagSel=el('select',{cls:'sb-filter-input',onChange:e=>{st.sbFilterTag=e.target.value;rr();}});
  tagSel.appendChild(el('option',{value:''},'All tags'));
  allTags.forEach(t=>{const o=el('option',{value:t},'#'+t);if(st.sbFilterTag===t)o.selected=true;tagSel.appendChild(o);});
  if(!allTags.length)tagSel.disabled=true;
  sfb.appendChild(tagSel);

  // Apply tag filter
  const filteredNodes=st.sbFilterTag?branchNodes.filter(n=>n.tags?.includes(st.sbFilterTag)):branchNodes;

  let _nodeCount=0;
  function renderNode(node,depth){
    if(!st.isPremium&&_nodeCount>=FREE_NODE_LIMIT)return;
    _nodeCount++;
    const isActive=node.id===st.selectedId,isPinned=node.pinned;
    const item=d('sb-item'+(isActive?' active':'')+(isPinned?' pinned':''),{onClick:()=>selectNode(node.id)});
    item.style.paddingLeft=(8+depth*14)+'px';
    item.setAttribute('draggable','true');
    item.addEventListener('dragstart',e=>{e.stopPropagation();e.dataTransfer.setData('text/plain',node.id);e.dataTransfer.effectAllowed='move';item.classList.add('dragging');});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    const iw=d('sb-iw',{});iw.appendChild(node.type==='label'?svgLabel():svgArtist());item.appendChild(iw);
    const main=d('sb-main',{});const top=d('sb-top',{});
    if(isPinned)top.appendChild(s('sb-pin-dot',''));
    top.appendChild(s('sb-name',node.name));main.appendChild(top);
    if(node.tags?.length){const tr=d('sb-tags',{});node.tags.forEach(tag=>tr.appendChild(d('sb-tag',{},'#'+tag,b('sb-tag-rm',{title:'Remove',onClick:e=>{e.stopPropagation();removeTag(node.id,tag);}},'×'))));main.appendChild(tr);}
    item.appendChild(main);
    const btns=d('sb-btns',{});
    const pb=b('sb-btn',{title:isPinned?'Unpin':'Pin',onClick:e=>{e.stopPropagation();togglePin(node.id);}});pb.appendChild(svgPin());btns.appendChild(pb);
    btns.appendChild(b('sb-btn',{title:'Tag',onClick:e=>{e.stopPropagation();st.tagNodeId=st.tagNodeId===node.id?null:node.id;st.tagVal='';rr();}},s('sb-hash','#')));
    btns.appendChild(b('sb-btn rm-btn',{title:'Remove',onClick:e=>{e.stopPropagation();removeNode(node.id);}},'×'));
    item.appendChild(btns);nodesWrap.appendChild(item);
    if(st.tagNodeId===node.id){
      const row=d('tag-row',{style:{paddingLeft:(8+depth*14+22)+'px'}});
      const inp=el('input',{type:'text',placeholder:'Tag...',value:st.tagVal,
        onInput:e=>{st.tagVal=e.target.value;},
        onKeydown:e=>{if(e.key==='Enter'){e.preventDefault();addTag(node.id,st.tagVal);}if(e.key==='Escape'){st.tagNodeId=null;rr();}e.stopPropagation();},onClick:e=>e.stopPropagation(),
      });
      row.appendChild(inp);row.appendChild(el('em',{},'↵'));nodesWrap.appendChild(row);setTimeout(()=>inp.focus(),0);
    }
  }

  if(!branchNodes.length){
    nodesWrap.appendChild(d('sb-empty',{},'Empty branch — search for an artist or label to start'));
  } else if(st.sbFilterTag&&!filteredNodes.length){
    nodesWrap.appendChild(d('sb-empty',{},'No nodes with this tag.'));
  } else if(st.sbFilterTag){
    // Flat filtered view
    let show=[...filteredNodes];
    if(st.sbPinFirst)show=[...show.filter(n=>n.pinned),...show.filter(n=>!n.pinned)];
    show.forEach(n=>renderNode(n,0));
  } else {
    // Normal tree view
    function recurse(parentId,depth){
      let ch=branchNodes.filter(n=>n.parentId===parentId);
      if(st.sbPinFirst)ch=[...ch.filter(n=>n.pinned),...ch.filter(n=>!n.pinned)];
      ch.forEach(node=>{renderNode(node,depth);recurse(node.id,depth+1);});
    }
    recurse(null,0);
  }
  if(!st.isPremium&&branchNodes.length>FREE_NODE_LIMIT){const lr=d('sb-locked-row',{onClick:()=>{st.premiumModal=true;rr();}});lr.appendChild(s('','🔒'));const extra=branchNodes.length-FREE_NODE_LIMIT;lr.appendChild(s('',extra+' more — soon unlocked'));lr.appendChild(s('sb-locked-badge','SOON'));nodesWrap.appendChild(lr);}
  bar.appendChild(nodesWrap);return bar;
}

// ── Content panel ──────────────────────────────────────────
function buildContent(){
  const panel=d('content',{'data-sc':'ct'});
  if(!st.selectedId){panel.appendChild(d('empty-panel',{},s('empty-icon','🌿'),s('empty-title','No node selected'),s('empty-hint','Search for an artist or label and select it from the sidebar')));return panel;}
  const node=getNode(st.selectedId);if(!node)return panel;

  const chain=ancestry(st.selectedId);
  if(chain.length>1){
    const bc=d('breadcrumb',{});
    chain.forEach((n,i)=>{if(i>0)bc.appendChild(s('crumb-sep',' › '));if(i<chain.length-1){const c=s('crumb',n.name);c.addEventListener('click',()=>selectNode(n.id));bc.appendChild(c);}else bc.appendChild(s('crumb-now',n.name));});
    panel.appendChild(bc);
  }

  // Header: image (if loaded) or icon
  const hdr=d('node-hdr',{});
  const imgUrl=node.data?.imageUrl||null;
  if(imgUrl){
    const wrap=d('node-hdr-imgwrap',{});
    wrap.appendChild(el('img',{cls:'node-hdr-img',src:imgUrl,alt:node.name,loading:'lazy'}));
    hdr.appendChild(wrap);
  } else {
    const iw=d('node-hdr-icon',{});iw.appendChild(node.type==='label'?svgLabel():svgArtist());hdr.appendChild(iw);
  }
  hdr.appendChild(el('h1',{cls:'node-title'},node.name));
  const isFollowed=st.follows.some(f=>f.discogs_id===node.discogsId&&f.type===node.type);
  hdr.appendChild(b('follow-btn'+(isFollowed?' following':''),{onClick:()=>toggleFollow(node)},isFollowed?'✓ Following':'+ Follow'));
  panel.appendChild(hdr);

  if(node.loading){panel.appendChild(buildPlantLoader());return panel;}
  if(node.error){panel.appendChild(buildErrorPanel(node));return panel;}
  if(!node.data)return panel;

  // Auto-trigger Bandcamp fetch for any loaded node (including demo node)
  if(!bcCacheMap[node.id])fetchBandcamp(node.id,node.data.name||node.name);

  const dt=node.data;const isLabel=node.type==='label';
  panel.appendChild(s('node-sub',(isLabel?'Label':'Artist')+' · '+dt.trackCount+' releases on Discogs'));

  // Highlights
  const hl=dt.highlights;
  if(hl){
    const chips=[];
    if(hl.yearRange)chips.push(hl.yearRange);
    chips.push(dt.trackCount+' release');
    if(dt.country)chips.push(dt.country);
    if(chips.length){const row=d('hl-row',{});chips.forEach(t=>{row.appendChild(s('hl-chip',t));});panel.appendChild(row);}
    const curiosity=hl.curiosity||(isLabel?hl.artistStr:hl.labelStr);
    if(curiosity)panel.appendChild(d('hl-curiosity',{},curiosity));
  }

  // Artisti correlati (via label principale)
  if(!isLabel&&dt.correlatedArtists?.length){
    const cs=d('corr-section',{});
    cs.appendChild(s('corr-lbl','Related artists'));
    const cl=d('corr-list',{});
    dt.correlatedArtists.forEach(name=>{
      const chip=b('corr-chip',{onClick:()=>{st.q=name;doSearch();}},name);
      cl.appendChild(chip);
    });
    cs.appendChild(cl);panel.appendChild(cs);
  }

  // Aliases / related labels
  if(!isLabel&&dt.aliases?.length){
    const row=d('alias-row',{});
    dt.aliases.slice(0,6).forEach(a=>{
      const pill=b('alias-pill',{onClick:()=>addNode(a.type||'artist',a.id,a.name,node.id,node.branchId)});
      const aiw=el('span',{style:{display:'flex',alignItems:'center'}});aiw.appendChild(a.type==='label'?svgLabel():svgArtist());
      pill.appendChild(aiw);pill.appendChild(document.createTextNode(' '+a.name+' ›'));row.appendChild(pill);
    });panel.appendChild(row);
  }
  if(isLabel){
    const related=[];
    if(dt.parentLabel)related.push({...dt.parentLabel,prefix:'↑ '});
    dt.sublabels?.slice(0,6).forEach(sl=>related.push({...sl,prefix:''}));
    if(related.length){
      const row=d('alias-row',{});
      related.forEach(r=>{
        const pill=b('alias-pill',{onClick:()=>addNode(r.type||'label',r.id,r.name,node.id,node.branchId)});
        const aiw=el('span',{style:{display:'flex',alignItems:'center'}});aiw.appendChild(svgLabel());
        pill.appendChild(aiw);pill.appendChild(document.createTextNode(' '+(r.prefix||'')+r.name+' ›'));row.appendChild(pill);
      });panel.appendChild(row);
    }
  }

  // Bio
  if(dt.bio){
    const open=!!st.bioOpen[node.id];
    panel.appendChild(d('bio-box',{},el('p',{cls:'bio-text'+(open?' open':'')},dt.bio),b('bio-more',{onClick:()=>{st.bioOpen[node.id]=!open;rr();}},open?'▲ less':'▼ read more')));
  }

  // Tracks with filter
  if(dt.tracks?.length){
    const filtered=applyFilters(dt.tracks);
    const hasFilter=st.filterTitle||st.filterFormat!=='all'||st.filterSort!=='default'||st.filterGenres.length>0;
    const PAGE=50;
    let page=tracksPageMap[node.id]||0;
    const totalPages=Math.ceil(filtered.length/PAGE);
    if(page>=totalPages)page=Math.max(0,totalPages-1);
    tracksPageMap[node.id]=page;
    const pageSlice=filtered.slice(page*PAGE,(page+1)*PAGE);

    const hdrRow=d('tracks-hdr',{});
    hdrRow.appendChild(el('p',{cls:'sec-lbl'},(isLabel?'RELEASES':'TRACKS')+' ('+dt.trackCount+' Discogs, '+filtered.length+' loaded)'));
    hdrRow.appendChild(b('filter-toggle'+(st.filterOpen?' on':''),{onClick:()=>{st.filterOpen=!st.filterOpen;rr();}},'⚙ Filter'+(hasFilter?' •':'')));
    panel.appendChild(hdrRow);

    if(st.filterOpen){
      const fb=d('filter-bar',{});
      fb.appendChild(el('input',{cls:'filter-input',type:'text',placeholder:'Search title...',value:st.filterTitle,
        onInput:e=>{st.filterTitle=e.target.value;tracksPageMap[node.id]=0;rr();}}));

      const sortSel=el('select',{cls:'filter-select',onChange:e=>{st.filterSort=e.target.value;tracksPageMap[node.id]=0;rr();}});
      [['default','Default order'],['antichrono','Newest first'],['chrono','Oldest first'],['az','A → Z'],['za','Z → A'],['genre','By style']].forEach(([v,l])=>sortSel.appendChild(el('option',{value:v,...(st.filterSort===v?{selected:''}:{})},l)));
      fb.appendChild(sortSel);

      const fmtSel=el('select',{cls:'filter-select',onChange:e=>{st.filterFormat=e.target.value;tracksPageMap[node.id]=0;rr();}});
      [['all','All formats'],['digital','Digital only'],['vinyl','Vinyl only']].forEach(([v,l])=>fmtSel.appendChild(el('option',{value:v,...(st.filterFormat===v?{selected:''}:{})},l)));
      fb.appendChild(fmtSel);

      const allGenres=[...new Set(dt.tracks.flatMap(t=>t.genre?t.genre.split(' · '):[])).values()].sort();
      if(allGenres.length>1){
        const gw=d('filter-genre-wrap',{});
        gw.appendChild(s('filter-genre-lbl','Genre'));
        allGenres.forEach(g=>{
          const active=st.filterGenres.includes(g);
          const c=genreColor(g);
          const chip=b('genre-chip',{onClick:()=>{
            st.filterGenres=active?st.filterGenres.filter(x=>x!==g):[...st.filterGenres,g];
            tracksPageMap[node.id]=0;rr();
          }},g);
          if(active)chip.style.cssText=`background:${c}1A;border-color:${c}88;color:${c}`;
          gw.appendChild(chip);
        });
        fb.appendChild(gw);
      }

      fb.appendChild(s('filter-results',filtered.length+' results'));
      if(hasFilter)fb.appendChild(b('filter-clear',{onClick:()=>{st.filterTitle='';st.filterFormat='all';st.filterSort='default';st.filterGenres=[];tracksPageMap[node.id]=0;rr();}},'× Clear'));
      panel.appendChild(fb);
    }

    if(pageSlice.length)groupTracksByRelease(pageSlice).forEach(g=>panel.appendChild(releaseCard(g,node.id,isLabel,node.name)));
    else panel.appendChild(d('filter-none',{},'No tracks match the filters.'));

    if(totalPages>1){
      const pg=d('tracks-pagination',{});
      const prev=b('pg-btn',{onClick:()=>{tracksPageMap[node.id]=page-1;rr();}},'← Prev');
      if(page===0)prev.setAttribute('disabled','');
      pg.appendChild(prev);
      const info=document.createElement('span');info.className='pg-info';
      info.textContent=`Page ${page+1} / ${totalPages}`;
      pg.appendChild(info);
      const next=b('pg-btn',{onClick:()=>{tracksPageMap[node.id]=page+1;rr();}},'Next →');
      if(page>=totalPages-1)next.setAttribute('disabled','');
      pg.appendChild(next);
      panel.appendChild(pg);
    }
  }

  // ── Bandcamp section — hidden entirely when the search finds nothing
  const bcData=bcCacheMap[node.id];
  if(bcData&&(bcData.loading||bcData.tracks.length)){
    const bcSec=d('bc-section',{});
    const hdr=d('bc-hdr',{});
    hdr.appendChild(el('p',{cls:'sec-lbl'},'BANDCAMP'));
    hdr.appendChild(s('bc-badge','via Edge Function'));
    bcSec.appendChild(hdr);
    if(bcData.loading){
      const ld=d('bc-loading',{});ld.appendChild(d('bc-spin',{}));ld.appendChild(document.createTextNode(' Searching Bandcamp…'));
      bcSec.appendChild(ld);
    }else{
      bcData.tracks.forEach(t=>{
        const row=d('bc-track',{});
        if(t.thumb)row.appendChild(el('img',{cls:'bc-thumb',src:t.thumb,alt:'',loading:'lazy'}));
        else row.appendChild(d('bc-thumb-ph',{},'🎵'));
        const info=d('bc-info',{});
        info.appendChild(s('bc-title',t.title));
        const meta=[t.artist,t.album,t.released].filter(Boolean).join(' · ');
        if(meta)info.appendChild(s('bc-meta',meta));
        row.appendChild(info);
        if(t.url)row.appendChild(el('a',{cls:'bc-link',href:t.url,target:'_blank',rel:'noreferrer'},'Listen ↗'));
        bcSec.appendChild(row);
      });
    }
    panel.appendChild(bcSec);
  }

  return panel;
}

      const row=d('hero-row',{});
      row.appendChild(entry.thumb
        ?el('img',{cls:'hero-thumb',src:entry.thumb,alt:'',loading:'lazy'})
        :d('hero-thumb-ph',{},type==='label'?'🏷️':'🎤'));
      const mid=d('hero-mid',{});
      mid.appendChild(s('hero-name',entry.name||'Unknown'));
      const parts=[];
      if(entry.collectionCount)parts.push(entry.collectionCount+' release'+(entry.collectionCount===1?'':'s')+' in your crates');
      if(entry.libraryCount)parts.push(entry.libraryCount+' track'+(entry.libraryCount===1?'':'s')+' in your library');
      mid.appendChild(s('hero-count',parts.join(' + ')));
      row.appendChild(mid);
      const actions=d('hero-actions',{});
      actions.appendChild(b('follow-btn'+(isFollowed?' following':''),{onClick:()=>{
        toggleFollow({discogsId:entry.id,type,name:entry.name,data:{imageUrl:entry.thumb||null}});
      }},isFollowed?'✓ Following':'+ Follow'));
      actions.appendChild(b('btn-sec',{onClick:()=>{
        st.heroesModal=false;
        addNode(type,entry.id,entry.name,null,st.activeBranchId);
      }},'Open ›'));
      row.appendChild(actions);
      return row;
    };
    if(heroes.artists.length){
      modal.appendChild(s('st-section','🎤 Artists you dig'));
      heroes.artists.forEach(a=>modal.appendChild(buildHeroRow(a,'artist')));
    }
    if(heroes.labels.length){
      modal.appendChild(s('st-section','🏷️ Labels you dig'));
      heroes.labels.forEach(l=>modal.appendChild(buildHeroRow(l,'label')));
    }
    const stillWorking=vaResolveInFlight.size>0||heroArtistResolveInFlight.size>0;
    if(stillWorking){
      modal.appendChild(d('',{style:'font-size:12px;color:var(--text-m);padding:10px 0 2px;font-style:italic'},'Still going through Various-artist releases and your local library — more may show up in a moment…'));
    }else if(!heroes.artists.length&&!heroes.labels.length){
      modal.appendChild(d('',{style:'font-size:13px;color:var(--text-m);padding:10px 0'},'Nothing stood out yet — dig a little more and check back.'));
    }
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  // ── Profile modal ───────────────────────────────────────────
  if(st.profileModal){
    const count=st.searchCount;
    const curLvl=getLevelFromCount(count);
    const nextLvl=LEVELS.find(l=>l.level===curLvl.level+1&&l.level<=15)||null;
    const progress=getProgressToNext(count);
    const remaining=nextLvl?nextLvl.min-count:0;
    const overlay=d('overlay',{onClick:()=>{st.profileModal=false;rr();}});
    const modal=d('modal profile-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('modal-row',{style:{justifyContent:'space-between',marginBottom:'16px'}},
      el('h2',{cls:'modal-title'},'🌲 My Profile'),
      b('btn-sec',{onClick:()=>{st.profileModal=false;rr();}},'×')
    ));
    const body=d('settings-body',{});
    // Hero
    const hero=d('lvl-hero',{});
    hero.appendChild(s('lvl-hero-title',curLvl.title));
    hero.appendChild(s('lvl-hero-tagline',curLvl.tagline));
    body.appendChild(hero);
    // Progress bar
    if(curLvl.level<15){
      const barWrap=d('lvl-bar-wrap',{});
      barWrap.appendChild(d('lvl-bar',{style:{width:progress+'%'}}));
      body.appendChild(barWrap);
      body.appendChild(d('lvl-bar-info',{},
        s('',progress+'% to next level'),
        s('',remaining+' more search'+(remaining!==1?'es':'')+' to unlock '+nextLvl.title)
      ));
    }
    // All 15 levels list
    const list=d('lvl-list',{});
    LEVELS.filter(l=>l.level<=15).forEach(l=>{
      const isActive=l.level===curLvl.level;
      const isUnlocked=count>=l.min;
      const item=d('lvl-item'+(isActive?' active':!isUnlocked?' locked':''),{});
      item.appendChild(s('lvl-num',l.level.toString()));
      const info=d('',{});
      info.appendChild(s('lvl-item-title',l.title));
      if(isUnlocked)info.appendChild(s('lvl-item-tag',l.tagline));
      item.appendChild(info);
      list.appendChild(item);
    });
    body.appendChild(list);
    modal.appendChild(body);
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  // ── Settings modal ──────────────────────────────────────────
  if(st.settingsModal){
    const overlay=d('overlay',{onClick:()=>{st.settingsModal=false;rr();}});
    const modal=d('modal settings-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('modal-row',{style:{justifyContent:'space-between',marginBottom:'16px'}},
      el('h2',{cls:'modal-title'},'⚙ My Settings'),
      b('btn-sec',{onClick:()=>{st.settingsModal=false;rr();}},'×')
    ));
    const email=wtSession?.user.email||'';
    const body=d('settings-body',{});

    // ── Account
    body.appendChild(s('st-section','Account'));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Email'),s('st-sub',email))
    ));
    // Profile photo row
    const avUrl=getAvatarUrl();
    const avInput=el('input',{type:'file',accept:'image/jpeg,image/png,image/webp',style:{display:'none'}});
    const avMsg=el('p',{style:{fontSize:'12px',margin:'4px 0 0',minHeight:'0',color:'var(--text-m)'}});
    const avBtn=b('btn-sec',{},avUrl?'Change photo':'Add photo');
    avBtn.onclick=()=>avInput.click();
    avInput.addEventListener('change',async()=>{
      const file=avInput.files[0];if(!file)return;
      avBtn.disabled=true;avBtn.textContent='Uploading…';avMsg.style.color='var(--text-m)';avMsg.textContent='';
      try{
        await uploadAvatar(file);
        avMsg.style.color='var(--accent)';avMsg.textContent='Photo updated!';
        avBtn.disabled=false;avBtn.textContent='Change photo';
        rr();
      }catch(e){
        avMsg.style.color='#F47B5E';avMsg.textContent=e.message||'Upload failed.';
        avBtn.disabled=false;avBtn.textContent=avUrl?'Change photo':'Add photo';
      }
    });
    const avRow=d('st-row',{style:{gap:'12px',alignItems:'center'}});
    avRow.appendChild(buildAvatarEl(48));
    const avLeft=d('',{style:{flex:'1',minWidth:'0'}});
    avLeft.appendChild(s('st-lbl','Profile photo'));
    avLeft.appendChild(s('st-sub',avUrl?'Linked to your account':'No photo yet'));
    avLeft.appendChild(avMsg);
    avRow.appendChild(avLeft);
    avRow.appendChild(avInput);
    avRow.appendChild(avBtn);
    body.appendChild(avRow);
    // Change password row — expands into an inline form
    const pwRow=d('st-row',{style:{flexWrap:'wrap',gap:'10px'}},
      d('',{},s('st-lbl','Password'),s('st-sub','Set a new password for your account'))
    );
    const pwForm=d('',{style:{display:'none',flexBasis:'100%',paddingBottom:'4px'}});
    const pwInput=el('input',{type:'password',placeholder:'New password (min. 8 chars)',style:{width:'100%',padding:'8px 12px',borderRadius:'10px',background:'var(--bg-e)',border:'1.5px solid var(--border)',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'}});
    const pwConfirm=el('input',{type:'password',placeholder:'Confirm new password',style:{width:'100%',padding:'8px 12px',borderRadius:'10px',background:'var(--bg-e)',border:'1.5px solid var(--border)',color:'var(--text)',fontSize:'13px',fontFamily:'inherit',outline:'none',marginBottom:'8px',boxSizing:'border-box'}});
    const pwMsg=el('p',{style:{fontSize:'12px',minHeight:'16px',margin:'0 0 8px',color:'var(--text-m)'}});
    const pwBtnRow=d('',{style:{display:'flex',gap:'8px',justifyContent:'flex-end'}});
    const cancelBtn=b('btn-sec',{},'Cancel');
    const saveBtn=b('btn-pri',{},'Save password');
    pwBtnRow.appendChild(cancelBtn);pwBtnRow.appendChild(saveBtn);
    pwForm.appendChild(pwInput);pwForm.appendChild(pwConfirm);pwForm.appendChild(pwMsg);pwForm.appendChild(pwBtnRow);
    // Toggle button
    const pwToggle=b('btn-sec',{onClick:()=>{const open=pwForm.style.display==='block';pwForm.style.display=open?'none':'block';pwToggle.textContent=open?'Change':'Cancel';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';if(!open)setTimeout(()=>pwInput.focus(),40);}},
    'Change');
    pwRow.appendChild(pwToggle);
    pwRow.appendChild(pwForm);
    cancelBtn.addEventListener('click',()=>{pwForm.style.display='none';pwToggle.textContent='Change';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';});
    saveBtn.addEventListener('click',async()=>{
      const pw=pwInput.value,cf=pwConfirm.value;
      if(pw.length<8){pwMsg.style.color='#F47B5E';pwMsg.textContent='Minimum 8 characters.';return;}
      if(pw!==cf){pwMsg.style.color='#F47B5E';pwMsg.textContent='Passwords do not match.';return;}
      saveBtn.disabled=true;saveBtn.textContent='Saving…';pwMsg.textContent='';
      const{error}=await sb.auth.updateUser({password:pw});
      if(error){
        saveBtn.disabled=false;saveBtn.textContent='Save password';
        pwMsg.style.color='#F47B5E';pwMsg.textContent=error.message;
      } else {
        pwMsg.style.color='var(--accent)';pwMsg.textContent='Password updated successfully.';
        saveBtn.textContent='Saved';
        setTimeout(()=>{pwForm.style.display='none';pwToggle.textContent='Change';pwInput.value='';pwConfirm.value='';pwMsg.textContent='';saveBtn.disabled=false;saveBtn.textContent='Save password';},2000);
      }
    });
    body.appendChild(pwRow);

    // Library scan moved to the Sync Libraries modal (buildLocalLibrarySection)

    // ── Data
    body.appendChild(s('st-section','Data'));
    const histCount=st.history.length;
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Listen history'),s('st-sub',histCount+' track'+(histCount!==1?'s':'')+' played')),
      b('btn-sec',{onClick:()=>{if(confirm('Clear listen history?')){st.history=[];st.listens={};rr();}}},'Clear')
    ));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl','Mini-player position'),s('st-sub','Reset to default bottom-right corner')),
      b('btn-sec',{onClick:()=>{ytPos=null;localStorage.removeItem('wt-player-pos');rr();}},'Reset')
    ));
    body.appendChild(d('st-row',{},
      d('',{},s('st-lbl st-danger','⚠ Reset all data'),s('st-sub','Erase all branches, nodes, likes and history')),
      b('btn-sec',{style:{borderColor:'#F47B5E',color:'#F47B5E'},onClick:()=>{if(confirm('Erase all data? This cannot be undone.')){localStorage.removeItem(SK);location.reload();}}},'Reset')
    ));

    modal.appendChild(body);
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  if(st.premiumModal){
    const overlay=d('overlay',{onClick:()=>{st.premiumModal=false;rr();}});
    const modal=d('modal premium-modal',{onClick:e=>e.stopPropagation()});
    modal.appendChild(d('premium-modal-icon',{},'🔒'));
    modal.appendChild(el('h2',{cls:'modal-title',style:{textAlign:'center',fontSize:'17px'}},'Feature coming soon'));
    modal.appendChild(s('modal-sub','We\'re still working on this — it\'ll be available soon. Thanks for testing WaxTree!'));
    modal.appendChild(el('button',{cls:'btn-premium',onClick:()=>{st.premiumModal=false;rr();}},'Got it'));
    overlay.appendChild(modal);root.appendChild(overlay);
  }

  return root;
}

sb.auth.onAuthStateChange((event)=>{
  if(event==='SIGNED_OUT')window.location.href='login.html';
});

window.addEventListener('resize',positionYtHost);

// Runs immediately, before the session check below — if localStorage is
// already near/at quota, this is what gives Supabase's own session-token
// write room to succeed instead of silently failing and bouncing straight
// back to login.html.
purgeExpiredCache();

sb.auth.getSession().then(({data:{session}})=>{
  if(!session){window.location.href='login.html';return;}
  wtSession=session;
  st.searchCount=wtSession.user.user_metadata?.search_count||0;
  st.ownedTracks=loadOwnedTracks()||wtSession.user.user_metadata?.owned_tracks||[];
  st.isPremium=wtSession.user.user_metadata?.premium===true;
  paint();
  loadFollows();
  handleDiscogsCallback();
  ensureNodeLoaded(st.selectedId);
  hydrateFromCloud();
  // A plain page reload restores st.nodes from localStorage directly — it never
  // calls selectNode(), so the version check there alone would never fire for
  // a node that's already selected before the reload. Sweep once at boot too.
  st.nodes.filter(n=>(n.type==='label'||n.type==='artist')&&n.loaded&&!n.loading&&n.data?._v!==TRACK_DATA_VERSION).forEach(n=>retryNode(n.id));
});

</script>
</body>
</html>
