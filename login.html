<!doctype html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WaxTree — Accedi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme=dark]{--bg:#07100A;--bg-s:#0B160D;--bg-e:#0F1C11;--bg-h:#152516;--text:#E8EDEA;--text-m:#8FB09A;--text-f:#4A6A56;--accent:#5EC47B;--accent-light:#90E0AA;--border:#152516;--shadow:0 8px 32px rgba(0,0,0,.65);--input-bg:#0F1C11;--err:#F47B5E}
[data-theme=light]{--bg:#E8F0EA;--bg-s:#F4FBF6;--bg-e:#EAF2EC;--bg-h:#D4E8D8;--text:#1B2D22;--text-m:#3D6B4E;--text-f:#8FB09A;--accent:#3DAE5A;--accent-light:#5EC47B;--border:#C0D9C7;--shadow:0 8px 32px rgba(0,0,0,.12);--input-bg:#fff;--err:#D94F2E}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
/* ── Card ── */
.card{background:var(--bg-s);border:1px solid var(--border);border-radius:20px;padding:44px 40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
/* ── Brand ── */
.brand{text-align:center;margin-bottom:32px}
.brand-name{font-size:26px;font-weight:700;letter-spacing:-.4px}
.brand-name em{font-style:normal;color:var(--accent-light)}
.brand-sub{font-size:13px;color:var(--text-m);margin-top:6px}
/* ── Form ── */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-m);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.field-wrap{position:relative}
.field input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,196,123,.14)}
.field input.error{border-color:var(--err)}
.field-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-f);font-size:15px;padding:2px;line-height:1;transition:color .15s}
.field-eye:hover{color:var(--text-m)}
/* ── Error ── */
.err-msg{font-size:12px;color:var(--err);margin-top:5px;min-height:16px}
.form-err{background:rgba(244,123,94,.1);border:1px solid rgba(244,123,94,.3);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--err);margin-bottom:16px;display:none}
.form-err.show{display:block}
/* ── Forgot ── */
.forgot{text-align:right;margin-top:-8px;margin-bottom:20px}
.forgot a{font-size:12px;color:var(--text-m);text-decoration:none;transition:color .15s}
.forgot a:hover{color:var(--accent)}
/* ── Submit ── */
.btn-main{width:100%;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit;margin-top:4px}
.btn-main:hover{opacity:.9}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:default}
/* ── Footer ── */
.card-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-m)}
.card-footer a{color:var(--accent);text-decoration:none;font-weight:500;transition:opacity .15s}
.card-footer a:hover{opacity:.8}
/* ── Theme toggle ── */
.theme-btn{position:fixed;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-s);border:1px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.theme-btn:hover{background:var(--bg-h)}
/* ── Spinner ── */
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="Cambia tema">🌙</button>

<div class="card">
  <div class="brand">
    <div class="brand-name"><em>Wax</em>Tree</div>
    <div class="brand-sub">Accedi al tuo account</div>
  </div>

  <div class="form-err" id="formErr"></div>

  <form id="loginForm" novalidate>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="la-tua@email.com" autocomplete="email">
      <div class="err-msg" id="emailErr"></div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:40px">
        <button type="button" class="field-eye" id="eyeBtn" aria-label="Mostra password">👁</button>
      </div>
      <div class="err-msg" id="passErr"></div>
    </div>

    <div class="forgot"><a href="forgot-password.html">Password dimenticata?</a></div>

    <button type="submit" class="btn-main" id="submitBtn">Accedi</button>
  </form>

  <div class="card-footer">
    Non hai un account? <a href="register.html">Registrati</a>
  </div>
</div>

<script>
const SK='wt-users', SESSION='wt-session';

// Theme
const html=document.documentElement;
const saved=localStorage.getItem('wt-theme');
if(saved)html.setAttribute('data-theme',saved);
const themeBtn=document.getElementById('themeBtn');
themeBtn.textContent=html.dataset.theme==='dark'?'☀':'🌙';
themeBtn.addEventListener('click',()=>{
  const next=html.dataset.theme==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('wt-theme',next);
  themeBtn.textContent=next==='dark'?'☀':'🌙';
});

// Already logged in?
if(localStorage.getItem(SESSION)){window.location.href='preview.html';}

// Eye toggle
const eyeBtn=document.getElementById('eyeBtn');
const passInput=document.getElementById('password');
eyeBtn.addEventListener('click',()=>{
  const show=passInput.type==='password';
  passInput.type=show?'text':'password';
  eyeBtn.textContent=show?'🙈':'👁';
});

// Helpers
function getUsers(){try{return JSON.parse(localStorage.getItem(SK)||'[]');}catch{return[];}}
function showFieldErr(id,msg){const el=document.getElementById(id);el.textContent=msg;el.previousElementSibling?.classList.toggle('error',!!msg);}
function clearErrs(){['emailErr','passErr'].forEach(id=>showFieldErr(id,''));document.getElementById('formErr').classList.remove('show');}
function showFormErr(msg){const el=document.getElementById('formErr');el.textContent=msg;el.classList.add('show');}

// Submit
document.getElementById('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  clearErrs();
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  let ok=true;
  if(!email){showFieldErr('emailErr','Inserisci la tua email');ok=false;}
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showFieldErr('emailErr','Email non valida');ok=false;}
  if(!pass){showFieldErr('passErr','Inserisci la tua password');ok=false;}
  if(!ok)return;
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Accesso in corso…';
  await new Promise(r=>setTimeout(r,600));
  const users=getUsers();
  const user=users.find(u=>u.email.toLowerCase()===email.toLowerCase()&&u.password===pass);
  if(user){
    localStorage.setItem(SESSION,JSON.stringify({username:user.username,email:user.email,loginAt:Date.now()}));
    // Carry theme
    localStorage.setItem('wt-theme',html.dataset.theme);
    window.location.href='preview.html';
  } else {
    btn.disabled=false;btn.textContent='Accedi';
    showFormErr('Email o password non corretti. Riprova.');
  }
});
</script>
</body>
</html>
