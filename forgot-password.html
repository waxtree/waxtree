<!doctype html>
<html lang="en" data-theme="light" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="google" content="notranslate">
<title>WaxTree — Reset Password</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme=dark]{--bg:#09090B;--bg-s:#111114;--bg-e:#17171B;--bg-h:#1F1F25;--text:#E8EDEA;--text-m:#7A9A8A;--text-f:#3E5A4A;--accent:#5EC47B;--accent-light:#90E0AA;--border:#1E1E25;--shadow:0 8px 32px rgba(0,0,0,.85);--input-bg:#17171B;--err:#F47B5E}
[data-theme=light]{--bg:#E8F0EA;--bg-s:#F4FBF6;--bg-e:#EAF2EC;--bg-h:#D4E8D8;--text:#1B2D22;--text-m:#3D6B4E;--text-f:#8FB09A;--accent:#3DAE5A;--accent-light:#5EC47B;--border:#C0D9C7;--shadow:0 8px 32px rgba(0,0,0,.12);--input-bg:#fff;--err:#D94F2E}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:var(--bg-s);border:1px solid var(--border);border-radius:20px;padding:44px 40px 36px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.brand{text-align:center;margin-bottom:32px}
.brand-name{font-size:26px;font-weight:700;letter-spacing:-.4px}
.brand-name em{font-style:normal;color:var(--accent-light)}
.brand-sub{font-size:13px;color:var(--text-m);margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-m);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.field input{width:100%;background:var(--input-bg);border:1.5px solid var(--border);border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(94,196,123,.14)}
.field input.error{border-color:var(--err)}
.err-msg{font-size:12px;color:var(--err);margin-top:5px;min-height:16px}
.hint{font-size:13px;color:var(--text-m);line-height:1.55;margin-bottom:20px}
.btn-main{width:100%;padding:13px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:opacity .15s,transform .1s;font-family:inherit}
.btn-main:hover{opacity:.9}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{opacity:.5;cursor:default}
.card-footer{text-align:center;margin-top:24px;font-size:13px;color:var(--text-m)}
.card-footer a{color:var(--accent);text-decoration:none;font-weight:500;transition:opacity .15s}
.card-footer a:hover{opacity:.8}
.theme-btn{position:fixed;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-s);border:1px solid var(--border);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.theme-btn:hover{background:var(--bg-h)}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.success-state{display:none;text-align:center}
.success-state.show{display:block}
.form-content.hide{display:none}
.success-icon{font-size:48px;margin-bottom:16px;line-height:1}
.success-title{font-size:18px;font-weight:700;margin-bottom:10px}
.success-body{font-size:13px;color:var(--text-m);line-height:1.6;margin-bottom:24px}
.success-email{color:var(--accent-light);font-weight:600}
.btn-secondary{display:inline-block;padding:11px 24px;border-radius:12px;border:1.5px solid var(--accent);color:var(--accent);font-size:14px;font-weight:600;text-decoration:none;transition:background .15s,color .15s}
.btn-secondary:hover{background:var(--accent);color:#fff}
</style>
</head>
<body>

<button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>

<div class="card">
  <div class="brand">
    <div class="brand-name"><em>Wax</em>Tree</div>
    <div class="brand-sub">Reset your password</div>
  </div>

  <div class="form-content" id="formContent">
    <p class="hint">Enter your account email address. We'll send you instructions to reset your password.</p>

    <form id="fpForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
        <div class="err-msg" id="emailErr"></div>
      </div>
      <button type="submit" class="btn-main" id="submitBtn">Send instructions</button>
    </form>

    <div class="card-footer" style="margin-top:20px">
      <a href="login.html">← Back to sign in</a>
    </div>
  </div>

  <div class="success-state" id="successState">
    <div class="success-icon">📬</div>
    <div class="success-title">Check your email</div>
    <div class="success-body">
      If the address <span class="success-email" id="sentEmail"></span> is registered, you'll receive instructions to reset your password within a few minutes.
    </div>
    <a href="login.html" class="btn-secondary">Back to sign in</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL='https://asmnqlqvlpcwcaaughuu.supabase.co';
const SUPABASE_KEY='sb_publishable_9_iPPYEKpklE07sQ1dmBow_wecQPqqZ';
const {createClient}=window.supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

// Theme
const html=document.documentElement;
const saved=localStorage.getItem('wt-theme');
if(saved)html.setAttribute('data-theme',saved);
const themeBtn=document.getElementById('themeBtn');
themeBtn.textContent=html.dataset.theme==='dark'?'☀':'🌙';
themeBtn.addEventListener('click',()=>{
  const next=html.dataset.theme==='dark'?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('wt-theme',next);
  themeBtn.textContent=next==='dark'?'☀':'🌙';
});

document.getElementById('fpForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const emailEl=document.getElementById('email');
  const errEl=document.getElementById('emailErr');
  const email=emailEl.value.trim();
  errEl.textContent='';emailEl.classList.remove('error');

  if(!email){errEl.textContent='Enter your email';emailEl.classList.add('error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){errEl.textContent='Invalid email';emailEl.classList.add('error');return;}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Sending…';

  // Always show success regardless of whether email exists (security best practice)
  await sb.auth.resetPasswordForEmail(email,{
    redirectTo:`${location.origin}${location.pathname.replace('forgot-password.html','reset-password.html')}`
  });

  document.getElementById('sentEmail').textContent=email;
  document.getElementById('formContent').classList.add('hide');
  document.getElementById('successState').classList.add('show');
});
</script>
</body>
</html>
